## ============================================================
## LiveMart — Alertmanager 라우팅 설정
## Slack (채널별) + Email + PagerDuty 라우팅
## ============================================================

global:
  # SMTP 설정 (이메일 알림)
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "livemart-alerts@gmail.com"
  smtp_auth_username: "${SMTP_USERNAME}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

  # Slack 기본 API URL
  slack_api_url: "${SLACK_WEBHOOK_URL}"

  # 알림 재시도 설정
  resolve_timeout: 5m

# ── 알림 템플릿 ────────────────────────────────────────────
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ── 라우팅 트리 ────────────────────────────────────────────
route:
  # 기본 라우터 (모든 알림이 여기서 시작)
  receiver: "slack-platform"
  group_by: ["alertname", "job", "severity"]
  group_wait: 30s        # 같은 그룹의 첫 알림 대기 시간 (배치)
  group_interval: 5m     # 같은 그룹 후속 알림 간격
  repeat_interval: 4h    # 미해결 알림 재발송 간격

  routes:
    # ── Critical: 즉시 PagerDuty + Slack-critical ──────────
    - match:
        severity: critical
      receiver: "pagerduty-critical"
      continue: true  # 아래 라우터도 계속 처리

    - match:
        severity: critical
      receiver: "slack-critical"
      group_wait: 10s
      repeat_interval: 1h

    # ── 결제팀 전용 ────────────────────────────────────────
    - match:
        team: payment
      receiver: "slack-payment"
      group_by: ["alertname"]
      group_wait: 15s
      repeat_interval: 30m

    # ── 플랫폼팀 (인프라) ──────────────────────────────────
    - match:
        team: platform
      receiver: "slack-platform"
      group_wait: 30s
      repeat_interval: 2h

    # ── 백엔드팀 ───────────────────────────────────────────
    - match:
        team: backend
      receiver: "slack-backend"
      group_wait: 60s
      repeat_interval: 4h

    # ── Warning: 이메일 요약 (야간 노이즈 최소화) ──────────
    - match:
        severity: warning
      receiver: "email-oncall"
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 12h

# ── 수신자 설정 ────────────────────────────────────────────
receivers:
  # ── Slack: Platform (기본, 인프라 이슈) ─────────────────
  - name: "slack-platform"
    slack_configs:
      - channel: "#livemart-alerts-platform"
        username: "AlertBot"
        icon_emoji: ":rotating_light:"
        title: |-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }} ({{ .Alerts.Firing | len }}){{ end }}]
          {{ range .GroupLabels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* `{{ .Labels.severity }}`
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* <{{ .Annotations.runbook }}|Link>{{ end }}
          *Started:* {{ .StartsAt | since }}
          {{ end }}
        send_resolved: true
        color: |-
          {{ if eq .Status "firing" }}{{ if eq (index .GroupLabels "severity") "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}

  # ── Slack: Critical 전용 채널 ────────────────────────────
  - name: "slack-critical"
    slack_configs:
      - channel: "#livemart-alerts-critical"
        username: "AlertBot-Critical"
        icon_emoji: ":fire:"
        title: "🚨 CRITICAL: {{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Job:* `{{ .Labels.job }}`
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* <{{ .Annotations.runbook }}|여기 클릭>{{ end }}
          *발생 시각:* {{ .StartsAt.Format "2006-01-02 15:04:05 KST" }}
          {{ end }}
        send_resolved: true
        color: "danger"

  # ── Slack: Backend팀 ─────────────────────────────────────
  - name: "slack-backend"
    slack_configs:
      - channel: "#livemart-alerts-backend"
        username: "AlertBot"
        icon_emoji: ":warning:"
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

  # ── Slack: Payment팀 ─────────────────────────────────────
  - name: "slack-payment"
    slack_configs:
      - channel: "#livemart-alerts-payment"
        username: "AlertBot-Payment"
        icon_emoji: ":credit_card:"
        title: "💳 결제 알림: {{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *심각도:* `{{ .Labels.severity }}`
          {{ end }}
        send_resolved: true
        color: |-
          {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}

  # ── PagerDuty: Critical 온콜 ─────────────────────────────
  - name: "pagerduty-critical"
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        description: "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"
        severity: |-
          {{ if eq (index .GroupLabels "severity") "critical" }}critical{{ else }}warning{{ end }}
        details:
          firing: "{{ .Alerts.Firing | len }}"
          resolved: "{{ .Alerts.Resolved | len }}"
          alertname: "{{ .GroupLabels.alertname }}"
          job: "{{ .GroupLabels.job }}"
        links:
          - href: "https://grafana.livemart.internal"
            text: "Grafana Dashboard"
          - href: "https://wiki.livemart.internal/runbooks"
            text: "Runbooks"

  # ── Email: 온콜 엔지니어 ─────────────────────────────────
  - name: "email-oncall"
    email_configs:
      - to: "oncall@livemart.internal"
        subject: |-
          [LiveMart][{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
          ({{ .Alerts.Firing | len }} firing / {{ .Alerts.Resolved | len }} resolved)
        html: |
          <h2>LiveMart Alert</h2>
          <table border="1" cellpadding="5" cellspacing="0">
            <tr><th>Alert</th><th>Severity</th><th>Description</th><th>Since</th></tr>
            {{ range .Alerts }}
            <tr>
              <td>{{ .Annotations.summary }}</td>
              <td><b>{{ .Labels.severity }}</b></td>
              <td>{{ .Annotations.description }}</td>
              <td>{{ .StartsAt | since }}</td>
            </tr>
            {{ end }}
          </table>
        send_resolved: true

# ── 알림 억제 규칙 (Inhibit Rules) ──────────────────────────
# Critical이 firing 중이면 같은 job의 Warning 억제 (노이즈 감소)
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "job"]

  # ServiceDown이 있으면 해당 서비스의 성능 알림 억제
  - source_match:
      alertname: "ServiceDown"
    target_match_re:
      alertname: "HighErrorRate.*|HighLatency.*|HighHeap.*"
    equal: ["job"]

  # EurekaServerDown이면 모든 서비스 연결 오류 억제
  - source_match:
      alertname: "EurekaServerDown"
    target_match_re:
      alertname: ".*Down|.*Connection.*"
    equal: []
