## ============================================================
## LiveMart — Prometheus Alert Rules (Production Grade)
## 총 25개 알림: 가용성, 성능, 인프라, 비즈니스 메트릭
## ============================================================

groups:

  # ══════════════════════════════════════════════════════════
  # 1. 가용성 (Availability)
  # ══════════════════════════════════════════════════════════
  - name: livemart.availability
    rules:
      - alert: ServiceDown
        expr: up{job=~"api-gateway|user-service|product-service|order-service|payment-service|inventory-service|notification-service|analytics-service|ai-service|eureka-server"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "서비스 다운: {{ $labels.job }}"
          description: "{{ $labels.job }} ({{ $labels.instance }}) 가 1분 이상 응답하지 않습니다."
          runbook: "https://wiki.livemart.internal/runbooks/service-down"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="livemart"}[15m]) * 60 * 15 > 3
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod CrashLoop: {{ $labels.pod }}"
          description: "{{ $labels.namespace }}/{{ $labels.pod }} 컨테이너가 15분 내 3회 이상 재시작했습니다."
          runbook: "https://wiki.livemart.internal/runbooks/pod-crashloop"

      - alert: PodNotReady
        expr: kube_pod_status_ready{namespace="livemart", condition="true"} == 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod Not Ready: {{ $labels.pod }}"
          description: "{{ $labels.namespace }}/{{ $labels.pod }} 가 5분 이상 Ready 상태가 아닙니다."

      - alert: DeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas{namespace="livemart"}
            != kube_deployment_status_available_replicas{namespace="livemart"}
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Deployment 레플리카 불일치: {{ $labels.deployment }}"
          description: "{{ $labels.deployment }} 의 목표 레플리카와 실제 가용 레플리카가 10분째 다릅니다."

      - alert: EurekaServerDown
        expr: up{job="eureka-server"} == 0
        for: 30s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Eureka Server 다운 — 서비스 디스커버리 불가"
          description: "Eureka Server 가 다운되면 모든 서비스 간 통신이 중단될 수 있습니다."

  # ══════════════════════════════════════════════════════════
  # 2. HTTP 성능 (Performance)
  # ══════════════════════════════════════════════════════════
  - name: livemart.performance
    rules:
      - alert: HighErrorRate5xx
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5..", namespace="livemart"}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count{namespace="livemart"}[5m])) by (job)
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "5xx 에러율 5% 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} 의 5xx 에러율이 {{ $value | humanizePercentage }} 입니다."
          runbook: "https://wiki.livemart.internal/runbooks/high-error-rate"

      - alert: HighErrorRate4xx
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"4..", status!="404", namespace="livemart"}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count{namespace="livemart"}[5m])) by (job)
          > 0.10
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "4xx 에러율 10% 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} 의 4xx 에러율이 {{ $value | humanizePercentage }} 입니다 (404 제외)."

      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket{namespace="livemart"}[5m])) by (job, le)
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "P95 응답시간 1초 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} P95 응답시간이 {{ $value | humanizeDuration }} 입니다."

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket{namespace="livemart"}[5m])) by (job, le)
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "P99 응답시간 3초 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} P99 응답시간이 {{ $value | humanizeDuration }} 입니다."

      - alert: PaymentServiceHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket{job="payment-service"}[5m])) by (le)
          ) > 2.0
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "결제 서비스 P95 응답시간 2초 초과 — 즉시 확인 필요"
          description: "payment-service P95 응답시간이 {{ $value | humanizeDuration }}. 결제 실패 증가 가능성."

  # ══════════════════════════════════════════════════════════
  # 3. JVM / 메모리
  # ══════════════════════════════════════════════════════════
  - name: livemart.jvm
    rules:
      - alert: HighHeapMemory
        expr: |
          jvm_memory_used_bytes{area="heap", namespace="livemart"}
          /
          jvm_memory_max_bytes{area="heap", namespace="livemart"}
          > 0.85
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "JVM Heap 85% 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} Heap 사용률이 {{ $value | humanizePercentage }}. GC 압박 또는 메모리 누수 가능성."

      - alert: CriticalHeapMemory
        expr: |
          jvm_memory_used_bytes{area="heap", namespace="livemart"}
          /
          jvm_memory_max_bytes{area="heap", namespace="livemart"}
          > 0.95
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "JVM Heap 95% 초과 — OOM 임박: {{ $labels.job }}"
          description: "{{ $labels.job }} Heap {{ $value | humanizePercentage }}. OOM Kill 위험. 즉시 조치 필요."

      - alert: HighGCPause
        expr: |
          rate(jvm_gc_pause_seconds_sum{namespace="livemart"}[5m])
          /
          rate(jvm_gc_pause_seconds_count{namespace="livemart"}[5m])
          > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "GC 평균 중단시간 500ms 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} 평균 GC pause {{ $value | humanizeDuration }}."

      - alert: HighThreadCount
        expr: jvm_threads_live_threads{namespace="livemart"} > 500
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "JVM 스레드 수 500 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} 활성 스레드 {{ $value }}개. 스레드 풀 설정 또는 데드락 확인."

  # ══════════════════════════════════════════════════════════
  # 4. 데이터베이스 / 커넥션 풀
  # ══════════════════════════════════════════════════════════
  - name: livemart.database
    rules:
      - alert: DBConnectionPoolExhausted
        expr: |
          hikaricp_connections_active{namespace="livemart"}
          /
          hikaricp_connections_max{namespace="livemart"}
          > 0.90
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "DB 커넥션 풀 90% 소진: {{ $labels.job }}"
          description: "{{ $labels.job }} HikariCP 커넥션 {{ $value | humanizePercentage }} 사용 중."

      - alert: DBConnectionPoolPending
        expr: hikaricp_connections_pending{namespace="livemart"} > 5
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "DB 커넥션 대기 큐 발생: {{ $labels.job }}"
          description: "{{ $labels.job }} 대기 중인 DB 커넥션 요청 {{ $value }}개."

      - alert: SlowDBQueries
        expr: |
          rate(hikaricp_connections_timeout_total{namespace="livemart"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "DB 커넥션 타임아웃 증가: {{ $labels.job }}"
          description: "{{ $labels.job }} DB 커넥션 타임아웃 발생률 {{ $value | humanize }}/s."

  # ══════════════════════════════════════════════════════════
  # 5. Kafka
  # ══════════════════════════════════════════════════════════
  - name: livemart.kafka
    rules:
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_fetch_manager_records_lag_max{namespace="livemart"} > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Kafka 컨슈머 랙 높음: {{ $labels.job }}"
          description: "{{ $labels.job }} 컨슈머 랙 {{ $value }}개. 메시지 처리 지연 발생."

      - alert: KafkaConsumerLagCritical
        expr: kafka_consumer_fetch_manager_records_lag_max{namespace="livemart"} > 10000
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Kafka 컨슈머 랙 위험 수준: {{ $labels.job }}"
          description: "{{ $labels.job }} 컨슈머 랙 {{ $value }}개. DLQ 확인 및 스케일링 필요."

      - alert: KafkaBrokerDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Kafka 브로커 다운 — 이벤트 처리 중단"
          description: "Kafka 브로커가 응답하지 않습니다. 주문/재고/알림 이벤트 처리 중단."

  # ══════════════════════════════════════════════════════════
  # 6. Redis
  # ══════════════════════════════════════════════════════════
  - name: livemart.redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis 다운 — Rate Limiting / 세션 / 캐시 영향"
          description: "Redis 가 다운되었습니다. API Gateway Rate Limiting 비활성화 및 캐시 미스 급증 예상."

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis 메모리 85% 초과"
          description: "Redis 메모리 사용률 {{ $value | humanizePercentage }}. Eviction 정책 확인 필요."

      - alert: RedisHighConnections
        expr: redis_connected_clients > 200
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis 연결 수 200 초과"
          description: "Redis 클라이언트 연결 수 {{ $value }}. 커넥션 풀 설정 확인."

  # ══════════════════════════════════════════════════════════
  # 7. 비즈니스 메트릭 (Business Metrics)
  # ══════════════════════════════════════════════════════════
  - name: livemart.business
    rules:
      - alert: PaymentFailureRateHigh
        expr: |
          sum(rate(payment_transactions_total{status="failed"}[10m]))
          /
          sum(rate(payment_transactions_total[10m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: payment
        annotations:
          summary: "결제 실패율 5% 초과 — 즉시 확인 필요"
          description: "결제 실패율 {{ $value | humanizePercentage }}. 결제 PG 또는 서비스 장애 가능성."

      - alert: OrderCreationDropped
        expr: |
          rate(orders_created_total[10m]) < 0.1
            and
          rate(http_server_requests_seconds_count{job="order-service", status="200"}[10m]) > 1
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "주문 생성 급감 — 비즈니스 로직 이상"
          description: "트래픽은 있으나 주문 생성이 감소했습니다. Kafka / DB 이벤트 처리 확인."

      - alert: InventoryStockAlertSpike
        expr: rate(inventory_stock_alert_total[5m]) > 10
        for: 3m
        labels:
          severity: warning
          team: inventory
        annotations:
          summary: "재고 부족 알림 급증"
          description: "재고 부족 알림이 {{ $value | humanize }}/s 발생. 인기 상품 재입고 또는 과다 주문 확인."
