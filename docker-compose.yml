version: '3.8'

# 로컬 개발용 인프라 컨테이너
# 사용법: cp .env.example .env && docker-compose up -d
# 비밀번호는 .env 파일에서 관리 — 절대 .env를 git에 커밋하지 마세요

services:
  # ===================== MySQL (User Service) =====================
  mysql-user:
    image: mysql:8.0
    container_name: livemart-mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-livemart-local-root}
      MYSQL_DATABASE: userdb
      MYSQL_USER: userapp
      MYSQL_PASSWORD: ${USER_DB_PASSWORD:-user123}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-user-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== MySQL (Product Service) =====================
  mysql-product:
    image: mysql:8.0
    container_name: livemart-mysql-product
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-livemart-local-root}
      MYSQL_DATABASE: productdb
      MYSQL_USER: productapp
      MYSQL_PASSWORD: ${PRODUCT_DB_PASSWORD:-product123}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-product-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== MySQL (Order Service) =====================
  mysql-order:
    image: mysql:8.0
    container_name: livemart-mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-livemart-local-root}
      MYSQL_DATABASE: orderdb
      MYSQL_USER: orderapp
      MYSQL_PASSWORD: ${ORDER_DB_PASSWORD:-order123}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3308:3306"
    volumes:
      - mysql-order-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== PostgreSQL (Payment Service) =====================
  postgres-payment:
    image: postgres:15
    container_name: livemart-postgres-payment
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: paymentapp
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paymentapp -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== Redis =====================
  redis:
    image: redis:7-alpine
    container_name: livemart-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== Zookeeper =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: livemart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ===================== Kafka =====================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: livemart-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===================== Elasticsearch =====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: livemart-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # 로컬 개발용. 운영에서는 반드시 true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===================== Zipkin (분산 추적) =====================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: livemart-zipkin
    ports:
      - "9411:9411"

  # ===================== Prometheus (메트릭 수집) =====================
  prometheus:
    image: prom/prometheus:latest
    container_name: livemart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # ===================== Grafana (모니터링 대시보드) =====================
  grafana:
    image: grafana/grafana:latest
    container_name: livemart-grafana
    ports:
      - "3001:3000"   # 3000은 Next.js가 사용하므로 3001로 분리
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY:-CHANGE_ME}
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  mysql-user-data:
  mysql-product-data:
  mysql-order-data:
  postgres-payment-data:
  redis-data:
  elasticsearch-data:
  grafana-data:
