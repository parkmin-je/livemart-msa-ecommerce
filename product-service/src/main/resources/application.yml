spring:
  application:
    name: product-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/productdb
    username: ${DB_USERNAME:productapp}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 10s
    socket-timeout: 60s

  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      printer:
        enabled: true

  # AI 기능은 OPENAI_API_KEY 환경변수가 설정되어 있을 때만 활성화됩니다
  # ai:
  #   openai:
  #     enabled: ${OPENAI_API_KEY:false}
  #     api-key: ${OPENAI_API_KEY:}
  #     chat:
  #       options:
  #         model: gpt-4o-mini
  #         temperature: 0.7

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082
  tomcat:
    threads:
      max: 400        # 기본 200 → 400 (50k 동시 접속 대응)
      min-spare: 20
    accept-count: 200   # 대기 큐 크기
    connection-timeout: 20000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}
      transport: http
  metrics:
    tags:
      application: product-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}

grpc:
  server:
    port: 9095

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
# 로컬 개발: 호스트명 해결 타임아웃 단축 (Cannot determine local hostname WARN 방지)
spring.cloud.inetutils.timeout-seconds: 1
logging.level.com.netflix.discovery: ERROR
logging.level.com.netflix.eureka: ERROR

---
# ── Railway 클라우드 프로파일 ────────────────────────────────
spring:
  config:
    activate:
      on-profile: "railway"
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8082}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server.railway.internal:8761/eureka/}
    initial-instance-info-replication-interval-seconds: 15
    registry-fetch-interval-seconds: 15
  instance:
    prefer-ip-address: false
    hostname: ${RAILWAY_PRIVATE_DOMAIN:product-service.railway.internal}
    non-secure-port: ${PORT:8082}
    non-secure-port-enabled: true

grpc:
  server:
    port: -1  # Railway에서는 gRPC 비활성화 (HTTP API만 사용)

logging:
  level:
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR

---
# ── Render 무료 클라우드 프로파일 ─────────────────────────────
spring:
  config:
    activate:
      on-profile: "render"
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      url: ${REDIS_URL}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8082}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

grpc:
  server:
    port: -1

logging:
  level:
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR
