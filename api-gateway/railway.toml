[build]
builder = "NIXPACKS"
buildCommand = "cd .. && ./gradlew :api-gateway:bootJar -x test"

[deploy]
startCommand = "java -Xms256m -Xmx512m -jar api-gateway/build/libs/api-gateway-2.0.0.jar --spring.profiles.active=railway"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
