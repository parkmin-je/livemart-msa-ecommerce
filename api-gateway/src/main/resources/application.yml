server:
  port: 8888

spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      # API Gateway는 자체 ApiKeyFilter로 인증 처리 → Spring Security 비활성화
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
  flyway:
    enabled: false
  # Redis (Rate Limiting 전용)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      # X-Forwarded 헤더 전달 - user-service가 {baseUrl}을 api-gateway URL로 인식
      forwarded:
        enabled: true
      x-forwarded:
        enabled: true
        for-enabled: true
        host-enabled: true
        port-enabled: true
        proto-enabled: true
        prefix-enabled: true

      # 전역 기본 필터
      # RequestRateLimiter는 로컬 개발 환경에서 KeyResolver 충돌로 403 유발 — 제거
      default-filters:
        - name: CircuitBreaker
          args:
            name: default
            fallbackUri: forward:/fallback

      routes:
        # User Service - API
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /api/users/${segment}

        # User Service - OAuth2 소셜 로그인
        - id: user-service-oauth2
          uri: lb://user-service
          predicates:
            - Path=/oauth2/**,/login/oauth2/**
          filters:
            - RewritePath=/(?<segment>.*), /${segment}

        # User Service - MFA API
        - id: user-service-mfa
          uri: lb://user-service
          predicates:
            - Path=/api/v1/mfa/**
          filters:
            - RewritePath=/api/v1/mfa(?<segment>.*), /api/v1/mfa${segment}

        # User Service - 인증 API (이메일 인증 등)
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/${segment}

        # Product Service
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**,/api/categories/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/${segment}

        # Order Service - 주문 생성/조회
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /api/orders/${segment}

        # Coupon & Return Service (Order Service)
        - id: coupon-service
          uri: lb://order-service
          predicates:
            - Path=/api/coupons/**
          filters:
            - RewritePath=/api/coupons/(?<segment>.*), /api/coupons/${segment}

        - id: return-service
          uri: lb://order-service
          predicates:
            - Path=/api/returns/**
          filters:
            - RewritePath=/api/returns/(?<segment>.*), /api/returns/${segment}

        # Delivery Service (Order Service)
        - id: delivery-service
          uri: lb://order-service
          predicates:
            - Path=/api/delivery/**
          filters:
            - RewritePath=/api/delivery/(?<segment>.*), /api/delivery/${segment}

        # Payment Service - 결제
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/payments(?<segment>.*), /api/v1/payments${segment}

        # Inventory Service
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - RewritePath=/api/inventory/(?<segment>.*), /api/v1/inventory/${segment}

        # Notification Service (미구현 - 라우팅만 유지)
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /api/notifications/${segment}

        # Analytics Service
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - RewritePath=/api/analytics/(?<segment>.*), /api/v1/analytics/${segment}

        # Analytics Dashboard Service (realtime)
        - id: analytics-dashboard-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/dashboard/**
          filters:
            - RewritePath=/api/dashboard/(?<segment>.*), /api/v1/dashboard/${segment}

        # Seller Dashboard (Product Service)
        - id: seller-dashboard
          uri: lb://product-service
          predicates:
            - Path=/api/sellers/**
          filters:
            - RewritePath=/api/sellers/(?<segment>.*), /api/sellers/${segment}

        # AI Service - 추천/설명생성/챗봇
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - RewritePath=/api/ai/(?<segment>.*), /api/ai/${segment}

        # Circuit Breaker fallback - 서킷 오픈 시 응답
        - id: fallback-route
          uri: no://op
          predicates:
            - Path=/fallback
          filters:
            - SetStatus=503

      # CORS 설정 - 프로덕션에서는 환경변수로 관리
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost"
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - ${CORS_ALLOWED_ORIGINS:http://localhost}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-API-Key
              - X-Requested-With
              - Cookie
            exposedHeaders:
              - Set-Cookie
            allowCredentials: true
            maxAge: 3600

# Actuator + Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics
  health:
    redis:
      # Redis는 Rate Limiter에 사용됨 → 헬스체크 활성화
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  # Distributed Tracing (Zipkin HTTP format — micrometer-tracing-bridge-brave 사용)
  # management.otlp.tracing → Zipkin HTTP endpoint 불일치 버그 수정:
  # OTLP exporter는 /v1/traces 경로(protobuf)를 사용하며 Zipkin의 /api/v2/spans와 호환되지 않음
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.gateway.filter.ratelimit: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# 로컬 개발: 호스트명 해결 타임아웃 단축 (Cannot determine local hostname WARN 방지)
spring.cloud.inetutils.timeout-seconds: 1
logging.level.com.netflix.discovery: ERROR
logging.level.com.netflix.eureka: ERROR
