server:
  port: 8080

spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  flyway:
    enabled: false
  # Redis (Rate Limiting 전용)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      # X-Forwarded 헤더 전달 - user-service가 {baseUrl}을 api-gateway URL로 인식
      forwarded:
        enabled: true
      x-forwarded:
        enabled: true
        for-enabled: true
        host-enabled: true
        port-enabled: true
        proto-enabled: true
        prefix-enabled: true

      # 전역 기본 필터: 모든 라우트에 Rate Limiting 적용
      # - replenishRate: 초당 토큰 충전 수 (정상 처리량)
      # - burstCapacity: 버킷 최대 용량 (순간 최대)
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"

      routes:
        # User Service - API
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /api/users/${segment}

        # User Service - OAuth2 소셜 로그인
        - id: user-service-oauth2
          uri: lb://user-service
          predicates:
            - Path=/oauth2/**,/login/oauth2/**
          filters:
            - RewritePath=/(?<segment>.*), /${segment}

        # User Service - 인증 API (이메일 인증 등)
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/${segment}

        # Product Service
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**,/api/categories/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/${segment}

        # Order Service - 주문 생성/조회 (낮은 rate limit: 20 req/s)
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /api/orders/${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # Coupon & Return Service (Order Service)
        - id: coupon-service
          uri: lb://order-service
          predicates:
            - Path=/api/coupons/**
          filters:
            - RewritePath=/api/coupons/(?<segment>.*), /api/coupons/${segment}

        - id: return-service
          uri: lb://order-service
          predicates:
            - Path=/api/returns/**
          filters:
            - RewritePath=/api/returns/(?<segment>.*), /api/returns/${segment}

        # Payment Service - 결제 (낮은 rate limit: 20 req/s)
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/payments/(?<segment>.*), /api/v1/payments/${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # Inventory Service (미구현 - 라우팅만 유지)
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - RewritePath=/api/inventory/(?<segment>.*), /api/inventory/${segment}

        # Notification Service (미구현 - 라우팅만 유지)
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /api/notifications/${segment}

        # Analytics Service (미구현 - 라우팅만 유지)
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - RewritePath=/api/analytics/(?<segment>.*), /api/analytics/${segment}

      # CORS 설정 - 프로덕션에서는 환경변수로 관리
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-API-Key
              - X-Requested-With
              - Cookie
            exposedHeaders:
              - Set-Cookie
            allowCredentials: true
            maxAge: 3600

# Actuator + Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  # Distributed Tracing (Zipkin HTTP format — micrometer-tracing-bridge-brave 사용)
  # management.otlp.tracing → Zipkin HTTP endpoint 불일치 버그 수정:
  # OTLP exporter는 /v1/traces 경로(protobuf)를 사용하며 Zipkin의 /api/v2/spans와 호환되지 않음
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.gateway.filter.ratelimit: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
