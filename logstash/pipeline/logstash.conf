# LiveMart 중앙 집중 로그 파이프라인
# 모든 마이크로서비스 → Logstash → Elasticsearch → Kibana

input {
  # TCP 입력 — 각 서비스의 logback-logstash 어펜더로부터 수신
  tcp {
    port => 5001
    codec => json_lines
    tags => ["spring-boot"]
  }

  # Beats 입력 — Filebeat 또는 Metricbeat 연동 (선택)
  beats {
    port => 5044
    tags => ["beats"]
  }
}

filter {
  # ── Spring Boot JSON 로그 파싱 ──────────────────────────────
  if "spring-boot" in [tags] {
    # 타임스탬프 파싱
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # 서비스명 필드 정규화
    if [logger_name] {
      mutate {
        add_field => { "service_package" => "%{logger_name}" }
      }
    }

    # 로그 레벨 대문자 정규화
    if [level] {
      mutate {
        uppercase => ["level"]
      }
    }

    # MDC 컨텍스트: traceId, spanId, userId 추출
    if [mdc] {
      ruby {
        code => "
          mdc = event.get('mdc')
          if mdc.is_a?(Hash)
            mdc.each { |k, v| event.set(k, v) }
          end
        "
      }
    }

    # 스택트레이스가 있으면 error 인덱스로 분류
    if [stack_trace] {
      mutate {
        add_tag => ["has_exception"]
      }
    }

    # 민감 정보 마스킹 (비밀번호, 토큰)
    mutate {
      gsub => [
        "message", "\"password\":\s*\"[^\"]+\"", "\"password\":\"[REDACTED]\"",
        "message", "\"token\":\s*\"[^\"]+\"", "\"token\":\"[REDACTED]\"",
        "message", "\"accessToken\":\s*\"[^\"]+\"", "\"accessToken\":\"[REDACTED]\"",
        "message", "Bearer [A-Za-z0-9._-]+", "Bearer [REDACTED]"
      ]
    }
  }

  # ── 불필요한 필드 제거 ──────────────────────────────────────
  mutate {
    remove_field => ["@version", "host", "port"]
  }
}

output {
  # ── Elasticsearch 출력 ──────────────────────────────────────
  elasticsearch {
    hosts => ["elasticsearch:9200"]

    # 서비스별 인덱스 분리 (ILM 적용 가능)
    index => "livemart-%{[service_name]:unknown}-%{+YYYY.MM.dd}"

    # 에러 로그 별도 인덱스
    if "has_exception" in [tags] {
      index => "livemart-errors-%{+YYYY.MM.dd}"
    }
  }

  # ── 개발환경 콘솔 출력 (프로덕션에서는 제거) ──────────────────
  if [level] == "ERROR" {
    stdout {
      codec => rubydebug {
        metadata => false
      }
    }
  }
}
