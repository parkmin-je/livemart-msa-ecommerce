spring:
  application:
    name: order-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/orderdb
    username: ${DB_USERNAME:orderapp}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: false
    validate-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8083

service:
  product-url: ${PRODUCT_SERVICE_URL:lb://product-service}
  payment-url: ${PAYMENT_SERVICE_URL:lb://payment-service}
  inventory-url: ${INVENTORY_SERVICE_URL:lb://inventory-service}

resilience4j:
  circuitbreaker:
    instances:
      productService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      paymentService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  retry:
    instances:
      productService:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
      paymentService:
        maxAttempts: 3
        waitDuration: 1000
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
    instances:
      productService:
        baseConfig: default
        timeoutDuration: 30s
      paymentService:
        baseConfig: default
        timeoutDuration: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}  # 개발: 1.0, 운영: 0.1
  otlp:
    tracing:
      # Jaeger OTLP HTTP 엔드포인트 (docker-compose: jaeger:4318, k8s: jaeger-collector:4318)
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}
      transport: http
  metrics:
    tags:
      application: order-service

# Spring Boot 3.4 Structured Logging — ELK 스택 연동
logging:
  structured:
    format:
      console: ecs                         # Elastic Common Schema JSON (Kibana 대시보드 연동)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}

spring.cloud:
  openfeign:
    circuitbreaker:
      enabled: true

grpc:
  client:
    product-grpc-server:
      address: static://localhost:9095
      negotiation-type: plaintext

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
# 로컬 개발: 호스트명 해결 타임아웃 단축 (Cannot determine local hostname WARN 방지)
spring.cloud.inetutils.timeout-seconds: 1
logging.level.com.netflix.discovery: ERROR
logging.level.com.netflix.eureka: ERROR

---
# ── Railway 클라우드 프로파일 ────────────────────────────────
spring:
  config:
    activate:
      on-profile: "railway"
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8083}

service:
  product-url: ${PRODUCT_SERVICE_URL:lb://product-service}
  payment-url: ${PAYMENT_SERVICE_URL:lb://payment-service}
  inventory-url: ${INVENTORY_SERVICE_URL:lb://inventory-service}

grpc:
  client:
    product-grpc-server:
      address: ${PRODUCT_GRPC_URL:static://product-service.railway.internal:9095}
      negotiation-type: plaintext

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server.railway.internal:8761/eureka/}
    initial-instance-info-replication-interval-seconds: 15
    registry-fetch-interval-seconds: 15
  instance:
    prefer-ip-address: false
    hostname: ${RAILWAY_PRIVATE_DOMAIN:order-service.railway.internal}
    non-secure-port: ${PORT:8083}
    non-secure-port-enabled: true

logging:
  level:
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR

---
# ── Render 무료 클라우드 프로파일 ─────────────────────────────
spring:
  config:
    activate:
      on-profile: "render"
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      url: ${REDIS_URL}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8083}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR
