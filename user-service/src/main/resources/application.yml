spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/userdb
    username: ${DB_USERNAME:userapp}
    # 운영: DB_PASSWORD 환경변수 필수. 로컬: .env 파일 참고 (cp .env.example .env)
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ─── 이메일 (네이버 SMTP) ─────────────────────────────────────
  mail:
    host: smtp.naver.com
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  # ─── OAuth2 소셜 로그인 ───────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          # 카카오 로그인
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8888}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao

          # 네이버 로그인
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8888}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Naver

          # 구글 로그인
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8888}/login/oauth2/code/{registrationId}"
            scope:
              - profile
              - email
            client-name: Google

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

server:
  port: 8085
  forward-headers-strategy: framework

jwt:
  # 최소 256비트(32바이트) 이상 랜덤값 필수. 생성: openssl rand -base64 64
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# OAuth2 성공 후 프론트엔드 리다이렉트 URI
oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/auth/callback}

# 쿠키 보안 설정 (프로덕션 기본값: true. 로컬 HTTP 개발환경에서만 COOKIE_SECURE=false 설정)
app:
  cookie:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:Strict}
    http-only: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: false
    redis:
      enabled: false
    elasticsearch:
      enabled: false
    mail:
      enabled: false
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}
      transport: http
  metrics:
    tags:
      application: user-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}  # 프로덕션 기본값 비활성화
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: false
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# 로컬 개발: 호스트명 해결 타임아웃 단축 (Cannot determine local hostname WARN 방지)
spring.cloud.inetutils.timeout-seconds: 1
logging.level.com.netflix.discovery: ERROR
logging.level.com.netflix.eureka: ERROR

---
# ── 로컬 개발 프로파일 (spring.profiles.active=local) ───────────
# 민감 정보 기본값 제공 — 절대 운영 환경에서 사용 금지
spring:
  config:
    activate:
      on-profile: "local"
  datasource:
    password: ${DB_PASSWORD:user123}
  mail:
    username: ${SMTP_USERNAME:dev@example.com}
    password: ${SMTP_PASSWORD:devpassword}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dev-kakao-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-kakao-secret}
          naver:
            client-id: ${NAVER_CLIENT_ID:dev-naver-id}
            client-secret: ${NAVER_CLIENT_SECRET:dev-naver-secret}
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-secret}

jwt:
  secret: ${JWT_SECRET:local-dev-jwt-secret-replace-before-production-deploy}
