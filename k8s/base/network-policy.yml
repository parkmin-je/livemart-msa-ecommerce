## LiveMart Network Policies
## 원칙: Default Deny → 명시적 허용만 통과
## 각 서비스는 지정된 포트/서비스만 통신 가능

---
# 1. Default Deny — 모든 네임스페이스 인바운드/아웃바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: livemart
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# 2. DNS 허용 (kube-dns, 모든 pod 필요)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: livemart
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# 3. Ingress → API Gateway 허용 (nginx ingress controller → :8080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api-gateway
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

---
# 4. API Gateway → 각 서비스 라우팅 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-services
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      role: backend-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8082   # product-service
        - protocol: TCP
          port: 8083   # order-service
        - protocol: TCP
          port: 8084   # payment-service
        - protocol: TCP
          port: 8085   # user-service
        - protocol: TCP
          port: 8086   # notification-service
        - protocol: TCP
          port: 8087   # analytics-service
        - protocol: TCP
          port: 8088   # ai-service
        - protocol: TCP
          port: 8089   # inventory-service

---
# 5. 서비스 → Redis 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-redis
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: backend-service
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 6379

---
# 6. 서비스 → Kafka 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-kafka
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: backend-service
      ports:
        - protocol: TCP
          port: 9092

---
# 7. 서비스 → PostgreSQL 허용 (각 서비스 전용 DB)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-postgres
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: backend-service
      ports:
        - protocol: TCP
          port: 5432

---
# 8. 서비스 → Elasticsearch 허용 (product-service, analytics-service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-elasticsearch
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      app: elasticsearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: product-service
        - podSelector:
            matchLabels:
              app: analytics-service
      ports:
        - protocol: TCP
          port: 9200

---
# 9. order-service → product-service gRPC 허용 (포트 50051)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-to-product-grpc
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - protocol: TCP
          port: 50051

---
# 10. Prometheus → 모든 서비스 메트릭 스크레이핑 허용 (:8080/actuator/prometheus)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      role: backend-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080

---
# 11. Eureka → 모든 서비스 등록/디스커버리 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-eureka
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      app: eureka-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: backend-service
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8761

---
# 12. 서비스 → 외부 인터넷 아웃바운드 허용 (결제 API, 이메일 등)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-internet
  namespace: livemart
spec:
  podSelector:
    matchLabels:
      role: backend-service
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # 내부 서비스 통신도 허용
    - to:
        - podSelector:
            matchLabels:
              role: backend-service
        - podSelector:
            matchLabels:
              app: redis
        - podSelector:
            matchLabels:
              app: kafka
        - podSelector:
            matchLabels:
              app: postgres
        - podSelector:
            matchLabels:
              app: elasticsearch
        - podSelector:
            matchLabels:
              app: eureka-server
