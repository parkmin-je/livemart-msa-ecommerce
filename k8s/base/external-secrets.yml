## ============================================================
## LiveMart — External Secrets Operator (ESO) 설정
## AWS Secrets Manager → Kubernetes Secret 자동 동기화
## https://external-secrets.io/
##
## 사전 조건:
##   helm repo add external-secrets https://charts.external-secrets.io
##   helm install external-secrets external-secrets/external-secrets \
##     --namespace external-secrets --create-namespace
## ============================================================

# ── ClusterSecretStore: AWS Secrets Manager ──────────────────
# 클러스터 전체에서 공유하는 시크릿 소스
# (네임스페이스별 분리가 필요하면 SecretStore 사용)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2    # 서울 리전
      auth:
        # IRSA (IAM Roles for Service Accounts) 방식 — 최신 권장 방법
        # Pod Identity 또는 OIDC 기반 역할 바인딩
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# ── ExternalSecret: LiveMart 애플리케이션 시크릿 ─────────────
# AWS Secrets Manager의 livemart/prod/secrets → K8s Secret 동기화
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-external-secret
  namespace: livemart
  annotations:
    # 마지막 동기화 상태 주석 (자동 업데이트)
    external-secrets.io/managed: "true"
spec:
  # 동기화 주기: 1시간마다 갱신
  refreshInterval: "1h"

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  # 생성/갱신할 K8s Secret
  target:
    name: livemart-secrets
    creationPolicy: Owner    # ESO가 소유 (삭제 시 K8s Secret도 삭제)
    deletionPolicy: Retain   # ExternalSecret 삭제 시 K8s Secret 유지 (안전)
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets-operator

  # AWS Secrets Manager 경로 → K8s Secret 키 매핑
  data:
    # JWT
    - secretKey: JWT_SECRET
      remoteRef:
        key: livemart/prod/secrets
        property: jwt_secret

    # PostgreSQL - User Service
    - secretKey: USER_DB_USERNAME
      remoteRef:
        key: livemart/prod/database/user
        property: username
    - secretKey: USER_DB_PASSWORD
      remoteRef:
        key: livemart/prod/database/user
        property: password

    # PostgreSQL - Product Service
    - secretKey: PRODUCT_DB_USERNAME
      remoteRef:
        key: livemart/prod/database/product
        property: username
    - secretKey: PRODUCT_DB_PASSWORD
      remoteRef:
        key: livemart/prod/database/product
        property: password

    # PostgreSQL - Order Service
    - secretKey: ORDER_DB_USERNAME
      remoteRef:
        key: livemart/prod/database/order
        property: username
    - secretKey: ORDER_DB_PASSWORD
      remoteRef:
        key: livemart/prod/database/order
        property: password

    # PostgreSQL - Payment Service
    - secretKey: PAYMENT_DB_USERNAME
      remoteRef:
        key: livemart/prod/database/payment
        property: username
    - secretKey: PAYMENT_DB_PASSWORD
      remoteRef:
        key: livemart/prod/database/payment
        property: password

    # PostgreSQL - Inventory Service
    - secretKey: INVENTORY_DB_USERNAME
      remoteRef:
        key: livemart/prod/database/inventory
        property: username
    - secretKey: INVENTORY_DB_PASSWORD
      remoteRef:
        key: livemart/prod/database/inventory
        property: password

    # Toss Payments
    - secretKey: TOSS_CLIENT_KEY
      remoteRef:
        key: livemart/prod/payments/toss
        property: client_key
    - secretKey: TOSS_SECRET_KEY
      remoteRef:
        key: livemart/prod/payments/toss
        property: secret_key

    # OAuth2 - Kakao
    - secretKey: KAKAO_CLIENT_ID
      remoteRef:
        key: livemart/prod/oauth/kakao
        property: client_id
    - secretKey: KAKAO_CLIENT_SECRET
      remoteRef:
        key: livemart/prod/oauth/kakao
        property: client_secret

    # OAuth2 - Naver
    - secretKey: NAVER_CLIENT_ID
      remoteRef:
        key: livemart/prod/oauth/naver
        property: client_id
    - secretKey: NAVER_CLIENT_SECRET
      remoteRef:
        key: livemart/prod/oauth/naver
        property: client_secret

    # OAuth2 - Google
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: livemart/prod/oauth/google
        property: client_id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: livemart/prod/oauth/google
        property: client_secret

    # SMTP
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: livemart/prod/smtp
        property: username
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: livemart/prod/smtp
        property: password

    # OpenAI (AI Service)
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: livemart/prod/ai/openai
        property: api_key

    # Slack (Alertmanager)
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: livemart/prod/monitoring/slack
        property: webhook_url

    # PagerDuty (Alertmanager)
    - secretKey: PAGERDUTY_ROUTING_KEY
      remoteRef:
        key: livemart/prod/monitoring/pagerduty
        property: routing_key
---
# ── ServiceAccount: ESO용 IRSA ───────────────────────────────
# AWS IAM Role Annotation 설정 (IRSA: IAM Roles for Service Accounts)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    # AWS IAM Role ARN — 실제 값으로 교체 필요
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/livemart-external-secrets-role"
    eks.amazonaws.com/audience: "sts.amazonaws.com"
