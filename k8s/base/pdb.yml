# PodDisruptionBudget (PDB) — 서비스별 가용성 보장
#
# maxUnavailable: "100%" 설정:
#   - replicas=1 환경에서 kubectl drain 차단 방지
#   - HPA가 replicas>=2로 스케일아웃한 시점부터 실질적 HA 보장
#   - "최대 100%까지 중단 가능" = drain은 허용, 단 새 Pod 스케줄링 실패는 별도 문제
#
# 권고: 프로덕션(AWS EKS) 에서는 minReplicas=2 이상 + minAvailable=1 적용
#       로컬 K8s(minikube/kind) 단일 노드에서는 maxUnavailable:"100%"가 현실적

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-order-service
  namespace: livemart
spec:
  maxUnavailable: "100%"
  selector:
    matchLabels:
      app: order-service

