# PodDisruptionBudget (PDB) — 서비스별 가용성 보장
#
# HPA 스케일다운 또는 노드 드레인(kubectl drain) 시
# 최소 1개 Pod가 항상 Running 상태를 유지하도록 보장
# replicas >= 2인 환경에서 true zero-downtime 달성

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-order-service
  namespace: livemart
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: order-service

