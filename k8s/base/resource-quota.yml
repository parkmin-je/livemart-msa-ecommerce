## ============================================================
## LiveMart — ResourceQuota + LimitRange
## 네임스페이스 전체 자원 상한 + 컨테이너 기본값 설정
## Production: 과도한 자원 소비 방지, 공정한 자원 분배
## ============================================================

# ── ResourceQuota ────────────────────────────────────────────
# 전체 livemart 네임스페이스 자원 상한
apiVersion: v1
kind: ResourceQuota
metadata:
  name: livemart-quota
  namespace: livemart
spec:
  hard:
    # CPU: 총 64코어 (각 서비스 최대 8코어 × 8 서비스)
    requests.cpu: "16"
    limits.cpu: "64"

    # Memory: 총 128Gi (각 서비스 최대 16Gi × 8)
    requests.memory: "32Gi"
    limits.memory: "128Gi"

    # Pod 수 상한: HPA maxReplicas 합산 + 인프라
    pods: "120"

    # Service / ConfigMap / Secret 상한
    services: "60"
    configmaps: "40"
    secrets: "30"

    # PVC 상한 (PostgreSQL × 4 + Kafka + Redis + ES + Prometheus)
    persistentvolumeclaims: "20"
    requests.storage: "500Gi"

    # LoadBalancer 타입 Service (비용 제한)
    services.loadbalancers: "3"
    services.nodeports: "0"
---
# ── LimitRange ───────────────────────────────────────────────
# 컨테이너 기본 요청/제한값 설정 (명시하지 않으면 이 값 적용)
apiVersion: v1
kind: LimitRange
metadata:
  name: livemart-limits
  namespace: livemart
spec:
  limits:
    # ── Container 기본값 ─────────────────────────────────────
    - type: Container
      # 명시적 requests/limits 없을 때 적용되는 기본값
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      # 컨테이너 하나의 최대/최소 제한
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "10m"
        memory: "64Mi"
      # requests:limits 비율 제한 (과도한 버스팅 방지)
      maxLimitRequestRatio:
        cpu: "10"
        memory: "8"

    # ── Pod 레벨 제한 ────────────────────────────────────────
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
      min:
        cpu: "10m"
        memory: "64Mi"

    # ── PVC 요청 크기 제한 ───────────────────────────────────
    - type: PersistentVolumeClaim
      max:
        storage: "100Gi"
      min:
        storage: "1Gi"
