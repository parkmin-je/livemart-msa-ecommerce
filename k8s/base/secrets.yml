apiVersion: v1
kind: Secret
metadata:
  name: livemart-secrets
  namespace: livemart
# ⚠️  이 파일은 템플릿입니다. 실제 값은 절대 커밋하지 마세요.
# 배포 방법:
#   1. 이 파일을 복사하여 secrets.local.yml 생성 (gitignore에 포함됨)
#   2. 아래 CHANGE_ME 값들을 실제 값으로 교체
#   3. kubectl apply -f secrets.local.yml -n livemart
#
# 권장: Kubernetes External Secrets Operator + AWS Secrets Manager / Vault 사용
type: Opaque
stringData:
  # JWT — openssl rand -base64 64 으로 생성
  JWT_SECRET: "CHANGE_ME_MINIMUM_256_BIT_RANDOM_VALUE"

  # PostgreSQL - User Service
  USER_DB_USERNAME: "userapp"
  USER_DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"

  # PostgreSQL - Product Service
  PRODUCT_DB_USERNAME: "productapp"
  PRODUCT_DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"

  # PostgreSQL - Order Service
  ORDER_DB_USERNAME: "orderapp"
  ORDER_DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"

  # PostgreSQL - Payment Service
  PAYMENT_DB_USERNAME: "paymentapp"
  PAYMENT_DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"

  # Toss Payments — https://developers.tosspayments.com
  TOSS_CLIENT_KEY: "CHANGE_ME"
  TOSS_SECRET_KEY: "CHANGE_ME"

  # OAuth2 - Kakao
  KAKAO_CLIENT_ID: "CHANGE_ME"
  KAKAO_CLIENT_SECRET: "CHANGE_ME"

  # OAuth2 - Naver
  NAVER_CLIENT_ID: "CHANGE_ME"
  NAVER_CLIENT_SECRET: "CHANGE_ME"

  # OAuth2 - Google
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"

  # SMTP
  SMTP_USERNAME: "CHANGE_ME"
  SMTP_PASSWORD: "CHANGE_ME"
