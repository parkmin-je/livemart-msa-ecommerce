apiVersion: v1
kind: Secret
metadata:
  name: livemart-secrets
  namespace: livemart
type: Opaque
stringData:
  # JWT
  JWT_SECRET: "your-secret-key-must-be-at-least-256-bits-long-for-HS256-algorithm-security"

  # PostgreSQL - User Service
  USER_DB_USERNAME: "userapp"
  USER_DB_PASSWORD: "user123"

  # PostgreSQL - Product Service
  PRODUCT_DB_USERNAME: "productapp"
  PRODUCT_DB_PASSWORD: "product123"

  # PostgreSQL - Order Service
  ORDER_DB_USERNAME: "orderapp"
  ORDER_DB_PASSWORD: "order123"

  # PostgreSQL - Payment Service
  PAYMENT_DB_USERNAME: "paymentapp"
  PAYMENT_DB_PASSWORD: "payment123"

  # OAuth2 - Kakao (실제 값으로 교체 필요)
  KAKAO_CLIENT_ID: "your-kakao-client-id"
  KAKAO_CLIENT_SECRET: "your-kakao-client-secret"

  # OAuth2 - Naver (실제 값으로 교체 필요)
  NAVER_CLIENT_ID: "your-naver-client-id"
  NAVER_CLIENT_SECRET: "your-naver-client-secret"

  # OAuth2 - Google (실제 값으로 교체 필요)
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"

  # SMTP - Naver (실제 값으로 교체 필요)
  SMTP_USERNAME: "your-naver-email@naver.com"
  SMTP_PASSWORD: "your-naver-app-password"
