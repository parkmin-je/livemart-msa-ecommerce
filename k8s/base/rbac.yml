## ============================================================
## LiveMart — RBAC: ServiceAccount + Role + RoleBinding
## 최소 권한 원칙(Principle of Least Privilege) 적용
## 각 서비스는 자신에게 필요한 권한만 보유
## ============================================================

# ── Namespace-level default deny ─────────────────────────────
# 모든 서비스용 공통 ServiceAccount

apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: livemart
  labels:
    app: api-gateway
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service-sa
  namespace: livemart
  labels:
    app: user-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service-sa
  namespace: livemart
  labels:
    app: product-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service-sa
  namespace: livemart
  labels:
    app: order-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service-sa
  namespace: livemart
  labels:
    app: payment-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-service-sa
  namespace: livemart
  labels:
    app: inventory-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service-sa
  namespace: livemart
  labels:
    app: notification-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-service-sa
  namespace: livemart
  labels:
    app: analytics-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-service-sa
  namespace: livemart
  labels:
    app: ai-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eureka-server-sa
  namespace: livemart
  labels:
    app: eureka-server

# ── Roles ─────────────────────────────────────────────────────
---
# API Gateway: ConfigMap 읽기 (라우팅 동적 로드)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: livemart
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["livemart-secrets"]
    verbs: ["get"]
---
# 일반 서비스: ConfigMap 읽기만
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-read-role
  namespace: livemart
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
# Eureka Server: 모든 Pod 목록 조회 (서비스 디스커버리)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eureka-role
  namespace: livemart
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

# ── RoleBindings ──────────────────────────────────────────────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-rb
  namespace: livemart
subjects:
  - kind: ServiceAccount
    name: api-gateway-sa
    namespace: livemart
roleRef:
  kind: Role
  name: api-gateway-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-rb
