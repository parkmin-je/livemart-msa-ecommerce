## ============================================================
## LiveMart — External Secrets Operator 완전 구성
## AWS Secrets Manager → Kubernetes Secret 자동 로테이션
##
## 아키텍처:
##   AWS Secrets Manager
##     └─ livemart/production/database   (DB 패스워드)
##     └─ livemart/production/jwt        (JWT 시크릿)
##     └─ livemart/production/openai     (OpenAI API 키)
##     └─ livemart/production/kafka      (MSK 인증)
##     └─ livemart/production/payment    (결제 API 키)
##
## 사전 조건:
##   1. External Secrets Operator 설치:
##      helm repo add external-secrets https://charts.external-secrets.io
##      helm install external-secrets external-secrets/external-secrets \
##        --namespace external-secrets --create-namespace \
##        --set installCRDs=true
##
##   2. IAM IRSA 설정 (terraform/modules/iam/main.tf에서 생성됨)
##
##   3. AWS Secrets Manager에 시크릿 생성:
##      aws secretsmanager create-secret \
##        --name livemart/production/database \
##        --secret-string '{"password":"...","username":"..."}'
## ============================================================

# ── 1. External Secrets Service Account ──────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    # IRSA: terraform/modules/iam/outputs.tf의 external_secrets_role_arn 값
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/livemart-external-secrets-role"
    eks.amazonaws.com/token-expiration: "86400"

---
# ── 2. ClusterSecretStore: AWS Secrets Manager ───────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: livemart-aws-secrets-manager
  annotations:
    description: "LiveMart 프로덕션 AWS Secrets Manager 연동"
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# ── 3. DB 패스워드 시크릿 ─────────────────────────────────────
# AWS Secrets Manager: livemart/production/database
# 구조: {"user_db_password": "...", "order_db_password": "...", ...}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-database-secrets
  namespace: livemart
  annotations:
    external-secrets.io/managed: "true"
spec:
  refreshInterval: "1h"    # 1시간마다 자동 갱신 (로테이션 반영)

  secretStoreRef:
    name: livemart-aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: livemart-database-secrets    # 생성될 K8s Secret 이름
    creationPolicy: Owner              # ExternalSecret 삭제 시 K8s Secret도 삭제
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/managed-by: external-secrets

  data:
    - secretKey: USER_DB_PASSWORD
      remoteRef:
        key: livemart/production/database
        property: user_db_password
    - secretKey: PRODUCT_DB_PASSWORD
      remoteRef:
        key: livemart/production/database
        property: product_db_password
    - secretKey: ORDER_DB_PASSWORD
      remoteRef:
        key: livemart/production/database
        property: order_db_password
    - secretKey: PAYMENT_DB_PASSWORD
      remoteRef:
        key: livemart/production/database
        property: payment_db_password
    - secretKey: ANALYTICS_DB_PASSWORD
      remoteRef:
        key: livemart/production/database
        property: analytics_db_password

---
# ── 4. JWT 시크릿 ────────────────────────────────────────────
# AWS Secrets Manager: livemart/production/jwt
# 구조: {"secret": "...", "refresh_secret": "..."}
# 로테이션: 90일마다 AWS Lambda로 자동 교체
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-jwt-secrets
  namespace: livemart
  annotations:
    external-secrets.io/managed: "true"
spec:
  refreshInterval: "1h"

  secretStoreRef:
    name: livemart-aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: livemart-jwt-secrets
    creationPolicy: Owner
    template:
      type: Opaque

  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: livemart/production/jwt
        property: secret
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: livemart/production/jwt
        property: refresh_secret

---
# ── 5. API 키 시크릿 (OpenAI, 결제, SMS 등) ─────────────────
# AWS Secrets Manager: livemart/production/api-keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-api-key-secrets
  namespace: livemart
  annotations:
    external-secrets.io/managed: "true"
spec:
  refreshInterval: "6h"    # API 키는 6시간 주기 (로테이션 빈도 낮음)

  secretStoreRef:
    name: livemart-aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: livemart-api-key-secrets
    creationPolicy: Owner
    template:
      type: Opaque

  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: livemart/production/api-keys
        property: openai_api_key
    - secretKey: TOSS_PAYMENT_SECRET_KEY
      remoteRef:
        key: livemart/production/api-keys
        property: toss_payment_secret_key
    - secretKey: PORTONE_API_SECRET
      remoteRef:
        key: livemart/production/api-keys
        property: portone_api_secret
    - secretKey: SMS_API_KEY
      remoteRef:
        key: livemart/production/api-keys
        property: sms_api_key
    - secretKey: FIREBASE_SERVER_KEY
      remoteRef:
        key: livemart/production/api-keys
        property: firebase_server_key

---
# ── 6. Kafka MSK 인증 시크릿 ─────────────────────────────────
# AWS Secrets Manager: livemart/production/kafka
# MSK SASL/IAM은 IRSA로 처리, 이 시크릿은 Kafka 설정값
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-kafka-secrets
  namespace: livemart
  annotations:
    external-secrets.io/managed: "true"
spec:
  refreshInterval: "24h"   # Kafka 설정은 변경 빈도 낮음

  secretStoreRef:
    name: livemart-aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: livemart-kafka-secrets
    creationPolicy: Owner
    template:
      type: Opaque

  data:
    - secretKey: KAFKA_BOOTSTRAP_SERVERS
      remoteRef:
        key: livemart/production/kafka
        property: bootstrap_brokers
    - secretKey: KAFKA_TRUSTSTORE_PASSWORD
      remoteRef:
        key: livemart/production/kafka
        property: truststore_password

---
# ── 7. Redis 인증 시크릿 ─────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-redis-secrets
  namespace: livemart
  annotations:
    external-secrets.io/managed: "true"
spec:
  refreshInterval: "1h"

  secretStoreRef:
    name: livemart-aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: livemart-redis-secrets
    creationPolicy: Owner
    template:
      type: Opaque

  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: livemart/production/redis
        property: host
    - secretKey: REDIS_PORT
      remoteRef:
        key: livemart/production/redis
        property: port
    - secretKey: REDIS_TLS_ENABLED
      remoteRef:
        key: livemart/production/redis
        property: tls_enabled

---
# ── 8. Grafana 관리자 시크릿 ─────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-monitoring-secrets
  namespace: monitoring
  annotations:
    external-secrets.io/managed: "true"
spec:
  refreshInterval: "24h"

  secretStoreRef:
    name: livemart-aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: livemart-monitoring-secrets
    creationPolicy: Owner
    template:
      type: Opaque

  data:
    - secretKey: GF_SECURITY_ADMIN_USER
      remoteRef:
        key: livemart/production/monitoring
        property: grafana_admin_user
    - secretKey: GF_SECURITY_ADMIN_PASSWORD
      remoteRef:
        key: livemart/production/monitoring
        property: grafana_admin_password
    - secretKey: GF_SECURITY_SECRET_KEY
      remoteRef:
        key: livemart/production/monitoring
        property: grafana_secret_key

---
# ── 9. OpenSearch 인증 시크릿 ─────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: livemart-opensearch-secrets
  namespace: livemart
  annotations:
    external-secrets.io/managed: "true"
spec:
  refreshInterval: "1h"

  secretStoreRef:
    name: livemart-aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: livemart-opensearch-secrets
    creationPolicy: Owner
    template:
      type: Opaque

  data:
    - secretKey: OPENSEARCH_ENDPOINT
      remoteRef:
        key: livemart/production/opensearch
        property: endpoint
    - secretKey: OPENSEARCH_USERNAME
      remoteRef:
        key: livemart/production/opensearch
        property: username
    - secretKey: OPENSEARCH_PASSWORD
      remoteRef:
        key: livemart/production/opensearch
        property: password
