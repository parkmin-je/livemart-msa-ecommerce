# ────────────────────────────────────────────────────────────────
# Istio Service Mesh — mTLS + Traffic Management
# ────────────────────────────────────────────────────────────────
# 전제조건: istioctl install --set profile=default
#           kubectl label namespace livemart istio-injection=enabled
# ────────────────────────────────────────────────────────────────

# 1. PeerAuthentication — 네임스페이스 전체 mTLS STRICT 모드
# East-West 트래픽(서비스 간 통신) 전구간 암호화
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: livemart-mtls-strict
  namespace: livemart
spec:
  mtls:
    mode: STRICT
---
# 2. AuthorizationPolicy — payment-service 접근 제한
# order-service와 api-gateway만 payment-service 호출 허용
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: payment-service-authz
  namespace: livemart
spec:
  selector:
    matchLabels:
      app: payment-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/livemart/sa/order-service-sa"
              - "cluster.local/ns/livemart/sa/api-gateway-sa"
      to:
        - operation:
            methods: ["POST", "GET"]
            paths: ["/api/v1/payments/*"]
---
# 3. AuthorizationPolicy — user-service 접근 제한
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: user-service-authz
  namespace: livemart
spec:
  selector:
    matchLabels:
      app: user-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/livemart/sa/api-gateway-sa"
              - "cluster.local/ns/livemart/sa/order-service-sa"
---
# 4. DestinationRule — order-service mTLS + Circuit Breaker
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: order-service-dr
  namespace: livemart
spec:
  host: order-service
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http2MaxRequests: 1000
        pendingHttpRequests: 100
    outlierDetection:
      # Circuit Breaker: 5분 안에 5번 5xx 발생 시 30초 추방
      consecutiveGatewayErrors: 5
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# 5. DestinationRule — payment-service (더 보수적 설정)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: payment-service-dr
  namespace: livemart
spec:
  host: payment-service
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http2MaxRequests: 200
        pendingHttpRequests: 50
    outlierDetection:
      # 결제 서비스: 더 엄격한 Circuit Breaker
      consecutiveGatewayErrors: 3
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
---
# 6. VirtualService — api-gateway 트래픽 라우팅
# Canary 배포 및 요청 미러링 기반 준비
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway-vs
  namespace: livemart
spec:
  hosts:
    - api.livemart.com
    - api-gateway
  gateways:
    - livemart-gateway
  http:
    - match:
        - uri:
            prefix: "/api/v1/payments"
      route:
        - destination:
            host: payment-service
            port:
              number: 8084
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure"
    - match:
        - uri:
            prefix: "/api/v1/orders"
      route:
        - destination:
            host: order-service
            port:
              number: 8083
      timeout: 15s
      retries:
        attempts: 2
        perTryTimeout: 5s
    - route:
        - destination:
            host: api-gateway
            port:
              number: 8080
---
# 7. VirtualService — order-service 카나리 배포 (트래픽 가중치 분할)
# 사용법:
#   카나리 시작: order-service-v2 Deployment 배포 후 weight 조정
#   - stable 90% → stable 70% → stable 50% → stable 0% (순차 전환)
#   롤백: weight: 100 (stable) / weight: 0 (canary) 로 즉시 복구
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: order-service-canary
  namespace: livemart
spec:
  hosts:
    - order-service
  http:
    - route:
        - destination:
            host: order-service
            subset: stable           # DestinationRule subset: version=v1
          weight: 90
        - destination:
            host: order-service
            subset: canary           # DestinationRule subset: version=v2
          weight: 10
      timeout: 15s
      retries:
        attempts: 2
        perTryTimeout: 5s
        retryOn: "5xx,reset,connect-failure"
---
# order-service DestinationRule — stable/canary 서브셋 정의
# Deployment에 label: version: v1 (stable) / version: v2 (canary) 추가 필요
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: order-service-canary-dr
  namespace: livemart
spec:
  host: order-service
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
  subsets:
    - name: stable
      labels:
        version: v1
    - name: canary
      labels:
        version: v2
---
# 8. Gateway — 외부 트래픽 진입점 (Istio Ingress Gateway)
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: livemart-gateway
  namespace: livemart
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: livemart-tls-secret
      hosts:
        - "api.livemart.com"
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - "api.livemart.com"
