apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: livemart
  labels:
    app: inventory-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: inventory-service
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8088"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: inventory-service-sa
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: inventory-service
          image: ghcr.io/livemart/inventory-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          envFrom:
            - configMapRef:
                name: livemart-config
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: livemart-config
                  key: INVENTORY_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: livemart-config
                  key: INVENTORY_DB_PORT
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: livemart-secrets
                  key: INVENTORY_DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: livemart-secrets
                  key: INVENTORY_DB_PASSWORD
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            tcpSocket:
              port: 8088
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 90
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 180
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                # Graceful shutdown: drain in-flight requests before SIGTERM
                command: ["/bin/sh", "-c", "sleep 15"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: livemart
  labels:
    app: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      protocol: TCP
  type: ClusterIP
