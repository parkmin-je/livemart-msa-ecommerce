apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-exporter
  namespace: livemart
  labels:
    app: metrics-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-exporter
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: metrics-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: metrics-exporter
          image: livemart/metrics-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9100
              name: metrics
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
                  optional: true
            - name: PORT
              value: "9100"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-exporter
  namespace: livemart
  labels:
    app: metrics-exporter
spec:
  selector:
    app: metrics-exporter
  ports:
    - port: 9100
      targetPort: 9100
      name: metrics
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: metrics-exporter
  namespace: livemart
  labels:
    app: metrics-exporter
    release: prometheus
spec:
  selector:
    matchLabels:
      app: metrics-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
