sonar.projectKey=parkmin-je_livemart-msa-ecommerce
sonar.projectName=LiveMart MSA E-Commerce
sonar.projectVersion=2.0.0
sonar.organization=parkmin-je

sonar.host.url=https://sonarcloud.io

# Source directories
sonar.sources=\
  order-service/src/main,\
  payment-service/src/main,\
  product-service/src/main,\
  user-service/src/main,\
  api-gateway/src/main,\
  inventory-service/src/main,\
  notification-service/src/main,\
  analytics-service/src/main,\
  common/src/main

sonar.tests=\
  order-service/src/test,\
  payment-service/src/test,\
  product-service/src/test,\
  user-service/src/test

sonar.java.binaries=**/build/classes
sonar.java.source=21

# JaCoCo coverage reports
sonar.coverage.jacoco.xmlReportPaths=\
  order-service/build/reports/jacoco/test/jacocoTestReport.xml,\
  payment-service/build/reports/jacoco/test/jacocoTestReport.xml,\
  product-service/build/reports/jacoco/test/jacocoTestReport.xml,\
  user-service/build/reports/jacoco/test/jacocoTestReport.xml

# Exclusions — generated code, config classes, DTOs
sonar.exclusions=\
  **/dto/**,\
  **/domain/**,\
  **/*Application.java,\
  **/config/**,\
  **/*MapperImpl.java,\
  **/*GrpcServiceGrpc.java,\
  **/*Proto*.java,\
  **/generated/**,\
  frontend/**,\
  **/build/**

sonar.test.exclusions=**/generated/**

# Quality Gate
sonar.qualitygate.wait=true

# Languages
sonar.language=java
