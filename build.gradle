plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.1' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
    id 'org.graalvm.buildtools.native' version '0.10.4' apply false
    id 'org.sonarqube' version '5.1.0.4882'
}

allprojects {
    group = 'com.livemart'
    version = '2.0.0'
}

ext {
    set('springCloudVersion', "2024.0.3")
    set('springCloudContractVersion', "4.1.4")
    set('opentelemetryVersion', "1.44.1")
    set('testcontainersVersion', "1.20.4")
    set('resilience4jVersion', "2.2.0")
    set('archunitVersion', "1.3.0")
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'jacoco'
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    repositories {
        mavenCentral()
    }

    dependencyManagement {
        imports {
            mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
            mavenBom "io.opentelemetry:opentelemetry-bom:${opentelemetryVersion}"
            mavenBom "org.testcontainers:testcontainers-bom:${testcontainersVersion}"
        }
        // Spring Boot 모든 모듈을 plugin 버전(3.4.1)으로 강제 통일
        dependencies {
            dependencySet(group: 'org.springframework.boot', version: '3.4.1') {
                entry 'spring-boot'
                entry 'spring-boot-autoconfigure'
                entry 'spring-boot-starter'
                entry 'spring-boot-starter-web'
                entry 'spring-boot-starter-webflux'
                entry 'spring-boot-starter-actuator'
                entry 'spring-boot-actuator'
                entry 'spring-boot-actuator-autoconfigure'
            }
        }
    }

    dependencies {
        // Lombok
        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.projectlombok:lombok'
        testCompileOnly 'org.projectlombok:lombok'
        testAnnotationProcessor 'org.projectlombok:lombok'

        // Testing
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

        // Testcontainers
        testImplementation 'org.testcontainers:testcontainers'
        testImplementation 'org.testcontainers:junit-jupiter'
        testImplementation 'org.testcontainers:postgresql'
        testImplementation 'org.testcontainers:kafka'

        // ArchUnit - Architecture Tests
        testImplementation "com.tngtech.archunit:archunit-junit5:${archunitVersion}"

        // Flyway DB Migration
        implementation 'org.flywaydb:flyway-core'
        implementation 'org.flywaydb:flyway-database-postgresql'

        // Actuator + Prometheus + Micrometer
        implementation 'org.springframework.boot:spring-boot-starter-actuator'
        implementation 'io.micrometer:micrometer-registry-prometheus'

        // OpenTelemetry - Distributed Tracing (replacing Zipkin)
        implementation 'io.micrometer:micrometer-tracing-bridge-otel'
        implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

        // Structured Logging (JSON)
        implementation 'net.logstash.logback:logstash-logback-encoder:9.0'
    }

    // Java 21 Preview APIs (StructuredTaskScope JEP 453, etc.) — compile + runtime
    tasks.withType(JavaCompile).configureEach {
        options.compilerArgs += ['--enable-preview']
        options.release = 21
    }

    // bootRun JVM 옵션 (BootRun은 기본적으로 별도 프로세스 실행)
    tasks.withType(org.springframework.boot.gradle.tasks.run.BootRun).configureEach {
        jvmArgs '--enable-preview', '-Xmx512m'
    }

    tasks.named('test') {
        useJUnitPlatform()
        jvmArgs '--enable-preview'
        finalizedBy jacocoTestReport
    }

    jacocoTestReport {
        dependsOn test
        reports {
            xml.required = true
            html.required = true
            csv.required = false
        }
        // 자동생성 코드 제외 (Mapstruct, Querydsl, Protobuf)
        afterEvaluate {
            classDirectories.setFrom(files(classDirectories.files.collect {
                fileTree(dir: it, exclude: [
                    '**/dto/**',
                    '**/domain/**',
                    '**/*Application*',
                    '**/config/**',
                    '**/*MapperImpl*',
                    '**/*GrpcServiceGrpc*',
                    '**/*Proto*',
                ])
            }))
        }
    }

    jacocoTestCoverageVerification {
        dependsOn jacocoTestReport
        violationRules {
            rule {
                // 서비스 레이어: 최소 70% 라인 커버리지
                element = 'PACKAGE'
                includes = ['com.livemart.*.service']
                limit {
                    counter = 'LINE'
                    value = 'COVEREDRATIO'
                    minimum = 0.70
                }
            }
            rule {
                // 컨트롤러 레이어: 최소 60% 라인 커버리지
                element = 'PACKAGE'
                includes = ['com.livemart.*.controller']
                limit {
                    counter = 'LINE'
                    value = 'COVEREDRATIO'
                    minimum = 0.60
                }
            }
        }
    }

    // Virtual Threads (Java 21 Project Loom) - enabled via application.yml
}

sonarqube {
    properties {
        property "sonar.projectKey", "livemart-msa-ecommerce"
        property "sonar.projectName", "LiveMart MSA E-Commerce"
        property "sonar.sourceEncoding", "UTF-8"
        property "sonar.java.source", "21"
        property "sonar.exclusions", "**/generated/**,**/dto/**,**/*MapperImpl*,**/*Application*"
        property "sonar.coverage.jacoco.xmlReportPaths", "${buildDir}/reports/jacoco/test/jacocoTestReport.xml"
    }
}
