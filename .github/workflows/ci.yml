name: CI — Build, Test & Coverage

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ── 단위/통합 테스트 + JaCoCo 커버리지 ──────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - order-service
          - payment-service
          - user-service
          - product-service
          - inventory-service

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: livemart_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests with JaCoCo
        run: |
          ./gradlew :${{ matrix.service }}:test \
            :${{ matrix.service }}:jacocoTestReport \
            --no-daemon --parallel \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/livemart_test \
            -Dspring.datasource.username=test \
            -Dspring.datasource.password=test
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/jacoco/test/
          retention-days: 7

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Tests — ${{ matrix.service }}
          path: ${{ matrix.service }}/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: false

  # ── 아키텍처 테스트 (ArchUnit) ───────────────────────────────────
  architecture-test:
    name: Architecture Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - order-service
          - payment-service
          - user-service
          - product-service
          - inventory-service
          - analytics-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run ArchUnit tests
        run: |
          ./gradlew :${{ matrix.service }}:test \
            --tests "*architecture*" \
            --no-daemon

  # ── 백엔드 서비스 빌드 (테스트 통과 후) ─────────────────────────
  build-backend:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - api-gateway
          - eureka-server
          - ai-service
          - notification-service
          - analytics-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:bootJar -x test --no-daemon --parallel

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/build/libs/*.jar
          retention-days: 1

  # ── 프론트엔드 빌드 & 타입 체크 ─────────────────────────────────
  build-frontend:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ── 코드 품질 분석 (Sonar / CodeCov) ────────────────────────────
  coverage-report:
    name: Coverage Aggregation
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage/
          merge-multiple: false

      - name: Display coverage summary
        run: |
          echo "## Coverage Reports" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Report |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for dir in coverage/*/; do
            service=$(basename "$dir" | sed 's/coverage-//')
            echo "| $service | ✅ Generated |" >> $GITHUB_STEP_SUMMARY
          done


  # ── SonarQube 정적 분석 ───────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage/
          merge-multiple: false

      - name: SonarQube Scan (Quality Gate 강제)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./gradlew sonarqube \
            -Dsonar.projectKey=livemart-msa-ecommerce \
            -Dsonar.projectName="LiveMart MSA E-Commerce" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=coverage/*/jacocoTestReport.xml \
            -Dsonar.java.source=21 \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.coverage.minimum=80 \
            --no-daemon
        # Quality Gate 실패 시 PR 차단 (main 브랜치 보호)
        continue-on-error: ${{ github.event_name == 'pull_request' && github.base_ref != 'main' }}

      - name: Quality Gate 결과 요약
        if: always()
        run: |
          echo "## SonarQube Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "- 커버리지 목표: **80% 이상**" >> $GITHUB_STEP_SUMMARY
          echo "- 보안 취약점: **0개**" >> $GITHUB_STEP_SUMMARY
          echo "- Blocker/Critical Issues: **0개**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SonarQube 대시보드: ${{ secrets.SONAR_HOST_URL }}/dashboard?id=livemart-msa-ecommerce" >> $GITHUB_STEP_SUMMARY

  # ── Lighthouse CI (Core Web Vitals) ─────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Next.js (standalone)
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Run Lighthouse CI
        working-directory: ./frontend
        run: |
          npx @lhci/cli@0.13.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── CI 결과 요약 ─────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, architecture-test, build-backend, build-frontend, lighthouse, sonarqube]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ needs.architecture-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Backend | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse CI | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarQube | ${{ needs.sonarqube.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Tests FAILED — PR cannot be merged" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if [[ "${{ needs.build-backend.result }}" == "failure" || "${{ needs.build-frontend.result }}" == "failure" ]]; then
            echo "❌ Build FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All checks passed" >> $GITHUB_STEP_SUMMARY
