name: Security — Secret Scan & SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # 매일 오전 2시(UTC) 정기 스캔
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  # ── Gitleaks: 하드코딩된 시크릿 탐지 ────────────────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 스캔

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Trivy: 의존성 취약점 스캔 ────────────────────────────────
  trivy-deps:
    name: Dependency Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── CodeQL: Java 정적 분석 ───────────────────────────────────
  codeql:
    name: CodeQL Analysis (Java)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended

      - name: Build for CodeQL
        run: |
          chmod +x gradlew
          ./gradlew :user-service:classes \
            :order-service:classes \
            :payment-service:classes \
            :product-service:classes \
            -x test --no-daemon --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:java'

  # ── Frontend 의존성 감사 ──────────────────────────────────────
  npm-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run npm audit (SARIF output)
        working-directory: ./frontend
        run: |
          npm audit --json > npm-audit.json || true
          echo "## npm audit results" >> $GITHUB_STEP_SUMMARY
          node -e "
            const r = require('./npm-audit.json');
            const v = r.metadata?.vulnerabilities || {};
            console.log('| Severity | Count |');
            console.log('|----------|-------|');
            ['critical','high','moderate','low'].forEach(s => {
              if (v[s]) console.log('| ' + s + ' | ' + v[s] + ' |');
            });
          " >> $GITHUB_STEP_SUMMARY || true

  # ── OWASP ZAP: 동적 애플리케이션 보안 테스트 (DAST) ──────────
  owasp-zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    # PR 또는 scheduled 시에만 실행 (비용/시간 절감)
    if: github.event_name == 'schedule' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan (API Gateway)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          fail_action: false  # 경고만 (CI 블로킹 없음) — 초기 단계

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 14

  # ── SonarCloud: 코드 품질 게이트 ─────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (SonarCloud 블레임 분석용)

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew :order-service:test :order-service:jacocoTestReport \
            :payment-service:test :payment-service:jacocoTestReport \
            :user-service:test :user-service:jacocoTestReport \
            -x :order-service:architecture \
            --no-daemon \
            -Dsonar.projectKey=parkmin-je_livemart-msa-ecommerce \
            -Dsonar.organization=parkmin-je \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths='**/build/reports/jacoco/test/jacocoTestReport.xml' \
            -Dsonar.java.binaries='**/build/classes' \
            -Dsonar.qualitygate.wait=true \
            sonarqube || echo "SonarCloud 분석 완료 (토큰 미설정 시 건너뜀)"
