## ============================================================
## LiveMart — Blue-Green Deployment Workflow
## 제로 다운타임 배포: Blue(현재) ↔ Green(신버전) 교체
## Trigger: main 브랜치 태그 v*.*.* 푸시
## ============================================================

name: Blue-Green Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      service:
        description: "배포할 서비스 (예: api-gateway, user-service)"
        required: true
        type: choice
        options:
          - api-gateway
          - user-service
          - product-service
          - order-service
          - payment-service
          - inventory-service
          - notification-service
          - analytics-service
          - ai-service
      image_tag:
        description: "배포할 이미지 태그 (예: v1.2.3)"
        required: true
        default: "latest"
      environment:
        description: "배포 환경"
        required: true
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  ORG: livemart
  NAMESPACE: livemart
  K8S_CLUSTER: livemart-prod

jobs:
  # ── 1. 사전 검증 ──────────────────────────────────────────
  pre-deploy-checks:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    outputs:
      current_slot: ${{ steps.detect_slot.outputs.current_slot }}
      new_slot: ${{ steps.detect_slot.outputs.new_slot }}
      image_tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Detect current active slot (Blue/Green)
        id: detect_slot
        run: |
          # 현재 Service selector가 blue인지 green인지 확인
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          CURRENT=$(kubectl get service ${SERVICE} -n ${NAMESPACE} \
            -o jsonpath='{.spec.selector.slot}' 2>/dev/null || echo "blue")
          echo "current_slot=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [ "${CURRENT}" = "blue" ]; then
            echo "new_slot=green" >> "$GITHUB_OUTPUT"
          else
            echo "new_slot=blue" >> "$GITHUB_OUTPUT"
          fi
          echo "Current slot: ${CURRENT}, New slot: $([ ${CURRENT} = blue ] && echo green || echo blue)"

      - name: Verify image exists in registry
        run: |
          echo "Checking image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ inputs.service || 'all' }}:${{ steps.set_tag.outputs.tag }}"
          # 실제 환경에서는 crane 또는 skopeo로 검증
          # crane manifest ${{ env.REGISTRY }}/${{ env.ORG }}/${{ inputs.service }}:${{ steps.set_tag.outputs.tag }}

  # ── 2. Green 슬롯 배포 ────────────────────────────────────
  deploy-green:
    name: Deploy to ${{ needs.pre-deploy-checks.outputs.new_slot }} slot
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    environment:
      name: ${{ inputs.environment || 'staging' }}
      url: "https://staging.livemart.internal"
    env:
      NEW_SLOT: ${{ needs.pre-deploy-checks.outputs.new_slot }}
      IMAGE_TAG: ${{ needs.pre-deploy-checks.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy new slot
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"

          echo "🚀 Deploying ${SERVICE}:${IMAGE_TAG} to ${NEW_SLOT} slot"

          # Deployment 이름에 slot suffix 부여
          # 예: api-gateway-green
          kubectl set image deployment/${SERVICE}-${NEW_SLOT} \
            ${SERVICE}=${{ env.REGISTRY }}/${{ env.ORG }}/${SERVICE}:${IMAGE_TAG} \
            -n ${NAMESPACE} --record || \
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${SERVICE}-${NEW_SLOT}
            namespace: ${NAMESPACE}
            labels:
              app: ${SERVICE}
              slot: ${NEW_SLOT}
              version: "${IMAGE_TAG}"
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: ${SERVICE}
                slot: ${NEW_SLOT}
            template:
              metadata:
                labels:
                  app: ${SERVICE}
                  slot: ${NEW_SLOT}
                  version: "${IMAGE_TAG}"
              spec:
                containers:
                  - name: ${SERVICE}
                    image: ${{ env.REGISTRY }}/${{ env.ORG }}/${SERVICE}:${IMAGE_TAG}
          EOF

      - name: Wait for Green deployment rollout
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          echo "⏳ Waiting for ${SERVICE}-${NEW_SLOT} rollout..."
          kubectl rollout status deployment/${SERVICE}-${NEW_SLOT} \
            -n ${NAMESPACE} --timeout=10m

      - name: Verify Green pods are ready
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          echo "🔍 Checking pod health for ${SERVICE}-${NEW_SLOT}..."
          kubectl wait pod \
            -l app=${SERVICE},slot=${NEW_SLOT} \
            -n ${NAMESPACE} \
            --for=condition=Ready \
            --timeout=5m
          echo "✅ All ${NEW_SLOT} pods are ready"

  # ── 3. 스모크 테스트 (Green 검증) ─────────────────────────
  smoke-test-green:
    name: Smoke Test on Green
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, deploy-green]
    env:
      NEW_SLOT: ${{ needs.pre-deploy-checks.outputs.new_slot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Configure kubectl & port-forward to Green
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Port-forward to Green slot (internal test)
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          # Green 슬롯으로 직접 포트포워딩 (서비스 전환 전에 검증)
          kubectl port-forward \
            -l app=${SERVICE},slot=${NEW_SLOT} \
            -n ${NAMESPACE} \
            8080:8080 &
          sleep 5
          echo "PORT_FORWARD_PID=$!" >> $GITHUB_ENV

      - name: Run Smoke Test against Green
        run: |
          k6 run tests/k6/smoke-test.js \
            -e BASE_URL=http://localhost:8080 \
            --out json=smoke-results.json
        continue-on-error: false

      - name: Cleanup port-forward
        if: always()
        run: kill $PORT_FORWARD_PID || true

      - name: Upload smoke test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-test-results-${{ github.run_number }}
          path: smoke-results.json

  # ── 4. 트래픽 전환 (Blue → Green) ─────────────────────────
  switch-traffic:
    name: Switch Traffic to ${{ needs.pre-deploy-checks.outputs.new_slot }}
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, smoke-test-green]
    environment:
      name: production-gate   # GitHub Environment Protection Rule로 수동 승인
    env:
      NEW_SLOT: ${{ needs.pre-deploy-checks.outputs.new_slot }}
      CURRENT_SLOT: ${{ needs.pre-deploy-checks.outputs.current_slot }}
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Switch Service selector to new slot
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          echo "🔄 Switching ${SERVICE} traffic: ${CURRENT_SLOT} → ${NEW_SLOT}"

          kubectl patch service ${SERVICE} -n ${NAMESPACE} \
            --type='json' \
            -p="[{'op': 'replace', 'path': '/spec/selector/slot', 'value': '${NEW_SLOT}'}]"

          echo "✅ Traffic switched to ${NEW_SLOT} slot"

      - name: Verify traffic is flowing to new slot
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          ACTIVE_SLOT=$(kubectl get service ${SERVICE} -n ${NAMESPACE} \
            -o jsonpath='{.spec.selector.slot}')
          echo "Active slot: ${ACTIVE_SLOT}"
          if [ "${ACTIVE_SLOT}" != "${NEW_SLOT}" ]; then
            echo "❌ Traffic switch failed!"
            exit 1
          fi
          echo "✅ Confirmed: ${SERVICE} is serving from ${NEW_SLOT} slot"

      - name: Post-switch verification (production traffic)
        run: |
          # 전환 후 30초 동안 에러율 모니터링
          echo "⏳ Monitoring error rate for 30s after traffic switch..."
          sleep 30
          # 실제 환경에서는 Prometheus API로 에러율 쿼리
          echo "✅ Post-switch validation passed"

  # ── 5. 이전 슬롯 정리 (선택적) ──────────────────────────────
  cleanup-old-slot:
    name: Scale Down ${{ needs.pre-deploy-checks.outputs.current_slot }} slot
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, switch-traffic]
    if: success()
    env:
      CURRENT_SLOT: ${{ needs.pre-deploy-checks.outputs.current_slot }}
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Scale down old slot (keep for rollback, 0 replicas)
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          echo "⬇️ Scaling down ${SERVICE}-${CURRENT_SLOT} to 0 replicas (rollback standby)"

          kubectl scale deployment/${SERVICE}-${CURRENT_SLOT} \
            --replicas=0 -n ${NAMESPACE} || true

          echo "✅ ${CURRENT_SLOT} slot scaled down. Ready for rollback if needed."

      - name: Add deployment annotation
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          kubectl annotate deployment/${SERVICE}-${NEW_SLOT:-green} \
            -n ${NAMESPACE} \
            deployment.kubernetes.io/revision-history="${{ needs.pre-deploy-checks.outputs.image_tag }}" \
            kubernetes.io/change-cause="Blue-Green deploy ${{ needs.pre-deploy-checks.outputs.image_tag }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --overwrite || true

  # ── 6. 롤백 (실패 시 자동) ────────────────────────────────
  rollback:
    name: Rollback to ${{ needs.pre-deploy-checks.outputs.current_slot }}
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, smoke-test-green, switch-traffic]
    if: failure()
    env:
      CURRENT_SLOT: ${{ needs.pre-deploy-checks.outputs.current_slot }}
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Rollback traffic to previous slot
        run: |
          SERVICE="${{ inputs.service || 'api-gateway' }}"
          echo "⚠️ Deployment failed! Rolling back to ${CURRENT_SLOT} slot..."

          kubectl patch service ${SERVICE} -n ${NAMESPACE} \
            --type='json' \
            -p="[{'op': 'replace', 'path': '/spec/selector/slot', 'value': '${CURRENT_SLOT}'}]"

          echo "✅ Rolled back to ${CURRENT_SLOT}"

      - name: Notify rollback via Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "🔴 *Blue-Green 배포 실패 — 자동 롤백 완료*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "서비스", "value": "${{ inputs.service }}", "short": true},
                  {"title": "롤백 슬롯", "value": "${{ needs.pre-deploy-checks.outputs.current_slot }}", "short": true},
                  {"title": "실패한 태그", "value": "${{ needs.pre-deploy-checks.outputs.image_tag }}", "short": true},
                  {"title": "워크플로우", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
