name: Load Test — K6 Performance CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'api-gateway/**'
      - 'product-service/**'
      - 'order-service/**'
      - 'payment-service/**'
      - 'k6/**'
  workflow_dispatch:
    inputs:
      scenario:
        description: '실행할 시나리오'
        required: true
        default: 'product-load'
        type: choice
        options:
          - product-load
          - order-flow
          - flash-sale
          - search-load
          - all
      base_url:
        description: '테스트 대상 URL'
        required: false
        default: 'http://localhost:8080'
      vus:
        description: '최대 VU 수 (override, 빈칸이면 시나리오 기본값 사용)'
        required: false
        default: ''

env:
  K6_VERSION: '0.55.0'

jobs:
  # ── 인프라 준비 확인 ────────────────────────────────────────
  preflight:
    name: 사전 점검
    runs-on: ubuntu-latest
    outputs:
      target_url: ${{ steps.set-url.outputs.url }}
    steps:
      - name: 대상 URL 결정
        id: set-url
        run: |
          URL="${{ github.event.inputs.base_url || 'http://localhost:8080' }}"
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "테스트 대상: ${URL}"

  # ── 상품 API 부하 테스트 ──────────────────────────────────────
  load-test-products:
    name: 상품 API 부하 테스트
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      github.event.inputs.scenario == 'product-load' ||
      github.event.inputs.scenario == 'all' ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: K6 설치
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz \
            | tar xz --strip-components=1 k6-v${K6_VERSION}-linux-amd64/k6
          sudo mv k6 /usr/local/bin/k6
          k6 version

      - name: 결과 디렉토리 생성
        run: mkdir -p k6/results

      - name: 상품 부하 테스트 실행
        run: |
          k6 run \
            --env BASE_URL=${{ needs.preflight.outputs.target_url }} \
            --out json=k6/results/product-load-raw.json \
            k6/scenarios/product-load.js
        continue-on-error: true
        id: product_test

      - name: 테스트 결과 요약
        if: always()
        run: |
          if [ -f k6/results/product-load-summary.json ]; then
            echo "## 상품 API 부하 테스트 결과" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat k6/results/product-load-summary.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          m = data.get('metrics', {})
          print(json.dumps({
            'p95_ms': round(m.get('http_req_duration', {}).get('values', {}).get('p(95)', 0)),
            'p99_ms': round(m.get('http_req_duration', {}).get('values', {}).get('p(99)', 0)),
            'error_rate_pct': round(m.get('http_req_failed', {}).get('values', {}).get('rate', 0) * 100, 3),
            'total_requests': m.get('http_reqs', {}).get('values', {}).get('count', 0),
          }, indent=2))
          " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 임계값 실패 확인
        if: steps.product_test.outcome == 'failure'
        run: |
          echo "::error::상품 API 부하 테스트 임계값 초과 — PR 병합 차단"
          exit 1

      - name: 결과 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-product-load-results
          path: k6/results/
          retention-days: 30

  # ── 주문 플로우 부하 테스트 ───────────────────────────────────
  load-test-order-flow:
    name: 주문 플로우 부하 테스트
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      github.event.inputs.scenario == 'order-flow' ||
      github.event.inputs.scenario == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: K6 설치
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz \
            | tar xz --strip-components=1 k6-v${K6_VERSION}-linux-amd64/k6
          sudo mv k6 /usr/local/bin/k6

      - name: 결과 디렉토리 생성
        run: mkdir -p k6/results

      - name: 주문 플로우 테스트 실행
        run: |
          k6 run \
            --env BASE_URL=${{ needs.preflight.outputs.target_url }} \
            --out json=k6/results/order-flow-raw.json \
            k6/scenarios/order-flow.js
        continue-on-error: true
        id: order_test

      - name: 결과 요약
        if: always()
        run: |
          echo "## 주문 플로우 부하 테스트 결과" >> $GITHUB_STEP_SUMMARY
          cat k6/results/order-flow-summary.json 2>/dev/null | head -50 || echo "결과 파일 없음"

      - name: 임계값 실패 확인
        if: steps.order_test.outcome == 'failure'
        run: |
          echo "::error::주문 플로우 부하 테스트 임계값 초과"
          exit 1

      - name: 결과 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-order-flow-results
          path: k6/results/
          retention-days: 30

  # ── 플래시 세일 Spike 테스트 ──────────────────────────────────
  load-test-flash-sale:
    name: 플래시 세일 Spike 테스트
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      github.event.inputs.scenario == 'flash-sale' ||
      github.event.inputs.scenario == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: K6 설치
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz \
            | tar xz --strip-components=1 k6-v${K6_VERSION}-linux-amd64/k6
          sudo mv k6 /usr/local/bin/k6

      - name: 결과 디렉토리 생성
        run: mkdir -p k6/results

      - name: Spike 테스트 실행 (경고만, 차단 안 함)
        run: |
          k6 run \
            --env BASE_URL=${{ needs.preflight.outputs.target_url }} \
            --env PRODUCT_ID=1 \
            --out json=k6/results/flash-sale-raw.json \
            k6/scenarios/flash-sale.js
        continue-on-error: true  # 스파이크는 실패 허용 (결과 분석용)

      - name: 결과 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-flash-sale-results
          path: k6/results/
          retention-days: 30

  # ── 검색 부하 테스트 ──────────────────────────────────────────
  load-test-search:
    name: 검색 부하 테스트
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      github.event.inputs.scenario == 'search-load' ||
      github.event.inputs.scenario == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: K6 설치
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz \
            | tar xz --strip-components=1 k6-v${K6_VERSION}-linux-amd64/k6
          sudo mv k6 /usr/local/bin/k6

      - name: 결과 디렉토리 생성
        run: mkdir -p k6/results

      - name: 검색 부하 테스트 실행
        run: |
          k6 run \
            --env BASE_URL=${{ needs.preflight.outputs.target_url }} \
            --out json=k6/results/search-load-raw.json \
            k6/scenarios/search-load.js
        continue-on-error: true
        id: search_test

      - name: 임계값 실패 확인
        if: steps.search_test.outcome == 'failure'
        run: |
          echo "::warning::검색 부하 테스트 임계값 초과 (경고)"

      - name: 결과 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-search-load-results
          path: k6/results/
          retention-days: 30

  # ── PR 결과 코멘트 ────────────────────────────────────────────
  comment-results:
    name: PR 결과 코멘트
    runs-on: ubuntu-latest
    needs: [load-test-products]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: 결과 다운로드
        uses: actions/download-artifact@v4
        with:
          name: k6-product-load-results
          path: k6/results/
        continue-on-error: true

      - name: PR 코멘트 작성
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body = '## K6 부하 테스트 결과\n\n';

            try {
              const summary = JSON.parse(fs.readFileSync('k6/results/product-load-summary.json', 'utf8'));
              const m = summary.metrics || {};

              const p95 = Math.round(m.http_req_duration?.values?.['p(95)'] || 0);
              const p99 = Math.round(m.http_req_duration?.values?.['p(99)'] || 0);
              const errorRate = ((m.http_req_failed?.values?.rate || 0) * 100).toFixed(3);
              const totalReqs = m.http_reqs?.values?.count || 0;

              const p95Status = p95 < 2000 ? '✅' : '❌';
              const errStatus = parseFloat(errorRate) < 1 ? '✅' : '❌';

              body += `### 상품 API 부하 테스트 (100→500 VU, 5분)\n`;
              body += `| 지표 | 값 | 임계값 | 상태 |\n`;
              body += `|------|-----|--------|------|\n`;
              body += `| P95 응답시간 | ${p95}ms | < 2000ms | ${p95Status} |\n`;
              body += `| P99 응답시간 | ${p99}ms | < 5000ms | ${p99 < 5000 ? '✅' : '❌'} |\n`;
              body += `| 에러율 | ${errorRate}% | < 1% | ${errStatus} |\n`;
              body += `| 총 요청 | ${totalReqs} | - | - |\n`;
            } catch (e) {
              body += '> 결과 파일을 읽을 수 없습니다. 로컬 인프라가 실행 중이지 않으면 테스트가 건너뛰어집니다.\n';
            }

            body += '\n---\n';
            body += `*테스트 실행 시각: ${new Date().toISOString()}*\n`;
            body += `*워크플로우: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
