server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: ai-service
  main:
    web-application-type: reactive   # Reactor Netty로 기동 (WebFlux SSE 스트리밍 지원)
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  # ── Spring Boot 3.4 Structured Logging (ECS 포맷 — ELK 스택 연동) ──────────
  logging:
    structured:
      format:
        console: ecs                       # Elastic Common Schema JSON 로그

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# OpenAI 설정
# OPENAI_API_KEY 환경변수로 주입 (절대 코드에 하드코딩 금지)
openai:
  api:
    key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
  model:
    recommendation: gpt-4o-mini    # 추천: 비용 효율적인 모델
    description: gpt-4o-mini       # 설명 생성: 창의성 필요
    chat: gpt-4o-mini              # 챗봇: 빠른 응답 우선

# Hunter Alpha (Xiaomi MiMo-V2-Pro) via OpenRouter — 아젠틱 태스크용
# OPENROUTER_API_KEY 환경변수로 주입 (절대 코드에 하드코딩 금지)
hunter-alpha:
  api:
    key: ${OPENROUTER_API_KEY:}
    base-url: https://openrouter.ai/api/v1
  model:
    agent: openrouter/hunter-alpha      # 셀러 에이전트: 멀티스텝 추론
    forecast: openrouter/hunter-alpha   # 수요 예측: 시계열 패턴 분석
    churn: openrouter/hunter-alpha      # 이탈 예측: 복잡한 행동 패턴

# AI 기능 활성화 플래그 (API Key 없을 때 graceful degradation)
ai:
  enabled: ${AI_ENABLED:true}
  fallback:
    enabled: true           # API Key 없으면 fallback 응답 반환

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
      transport: http                      # gRPC: grpc (포트 4317), HTTP: http (포트 4318)

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.livemart.ai: DEBUG
    org.springframework.web.client: DEBUG

# 로컬 개발: 호스트명 해결 타임아웃 단축 (Cannot determine local hostname WARN 방지)
spring.cloud.inetutils.timeout-seconds: 1
logging.level.com.netflix.discovery: ERROR
logging.level.com.netflix.eureka: ERROR
