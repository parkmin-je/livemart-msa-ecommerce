server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: ai-service
  main:
    web-application-type: reactive   # Reactor Netty로 기동 (WebFlux SSE 스트리밍 지원)
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ── Spring AI 1.0 설정 ──────────────────────────────────────────────────────
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}          # 환경변수로 주입 (코드에 절대 하드코딩 금지)
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini               # CS 챗봇: 비용 효율적이고 빠른 응답
          temperature: 0.3                 # 일관성 우선 (낮을수록 deterministic)
          max-tokens: 800
      embedding:
        options:
          model: text-embedding-3-small    # RAG 벡터 생성 (향후 확장)

  # ── Spring Boot 3.4 Structured Logging (ECS 포맷 — ELK 스택 연동) ──────────
  logging:
    structured:
      format:
        console: ecs                       # Elastic Common Schema JSON 로그

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# OpenAI 설정
# OPENAI_API_KEY 환경변수로 주입 (절대 코드에 하드코딩 금지)
openai:
  api:
    key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
  model:
    recommendation: gpt-4o-mini    # 추천: 비용 효율적인 모델
    description: gpt-4o-mini       # 설명 생성: 창의성 필요
    chat: gpt-4o-mini              # 챗봇: 빠른 응답 우선

# AI 기능 활성화 플래그 (API Key 없을 때 graceful degradation)
ai:
  enabled: ${AI_ENABLED:true}
  fallback:
    enabled: true           # API Key 없으면 fallback 응답 반환

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
      transport: http                      # gRPC: grpc (포트 4317), HTTP: http (포트 4318)

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.livemart.ai: DEBUG
    org.springframework.web.client: DEBUG
