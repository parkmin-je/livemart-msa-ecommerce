services:
  - type: web
    name: livemart-api-gateway
    env: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://livemart-parkmin-jes-projects.vercel.app
      - key: REDIS_URL
        sync: false
      - key: USER_SERVICE_URL
        sync: false
      - key: PRODUCT_SERVICE_URL
        sync: false
      - key: ORDER_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: INVENTORY_SERVICE_URL
        sync: false

  - type: worker
    name: livemart-user-service
    env: docker
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH2_REDIRECT_URI
        value: https://livemart-parkmin-jes-projects.vercel.app/auth/oauth2/callback
      - key: OAUTH2_BASE_URL
        sync: false

  - type: worker
    name: livemart-product-service
    env: docker
    dockerfilePath: ./product-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false

  - type: worker
    name: livemart-order-service
    env: docker
    dockerfilePath: ./order-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: worker
    name: livemart-payment-service
    env: docker
    dockerfilePath: ./payment-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: TOSS_CLIENT_KEY
        value: test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq
      - key: TOSS_SECRET_KEY
        sync: false

  - type: worker
    name: livemart-ai-service
    env: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: worker
    name: livemart-inventory-service
    env: docker
    dockerfilePath: ./inventory-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
