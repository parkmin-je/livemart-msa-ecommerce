services:
  # API Gateway — 외부 공개 URL (Vercel이 이 URL로 연결)
  - type: web
    name: livemart-api-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildArgs:
      SERVICE_NAME: api-gateway
      SERVICE_VERSION: "2.0.0"
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: CORS_ALLOWED_ORIGINS
        value: https://livemart-parkmin-jes-projects.vercel.app
      - key: JAVA_TOOL_OPTIONS
        value: "--spring.profiles.active=render"
      - key: REDIS_URL
        sync: false
      - key: USER_SERVICE_URL
        sync: false
      - key: PRODUCT_SERVICE_URL
        sync: false
      - key: ORDER_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: INVENTORY_SERVICE_URL
        sync: false

  # User Service
  - type: worker
    name: livemart-user-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildArgs:
      SERVICE_NAME: user-service
      SERVICE_VERSION: "2.0.0"
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH2_REDIRECT_URI
        value: https://livemart-parkmin-jes-projects.vercel.app/auth/oauth2/callback
      - key: OAUTH2_BASE_URL
        sync: false

  # Product Service
  - type: worker
    name: livemart-product-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildArgs:
      SERVICE_NAME: product-service
      SERVICE_VERSION: "2.0.0"
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false

  # Order Service
  - type: worker
    name: livemart-order-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildArgs:
      SERVICE_NAME: order-service
      SERVICE_VERSION: "2.0.0"
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Payment Service
  - type: worker
    name: livemart-payment-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildArgs:
      SERVICE_NAME: payment-service
      SERVICE_VERSION: "2.0.0"
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: TOSS_CLIENT_KEY
        value: test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq
      - key: TOSS_SECRET_KEY
        sync: false

  # AI Service
  - type: worker
    name: livemart-ai-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildArgs:
      SERVICE_NAME: ai-service
      SERVICE_VERSION: "2.0.0"
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Inventory Service
  - type: worker
    name: livemart-inventory-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildArgs:
      SERVICE_NAME: inventory-service
      SERVICE_VERSION: "2.0.0"
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
