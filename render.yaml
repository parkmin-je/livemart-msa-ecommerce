# render.yaml — Render Blueprint
# 사용법: Render 대시보드 → New → Blueprint → 이 레포 선택
# 모든 서비스가 한번에 생성됨 (환경변수는 대시보드에서 추가 입력 필요)

services:
  # ─────────────────────────────────────────────
  # API Gateway (유일하게 공개 URL 필요)
  # ─────────────────────────────────────────────
  - type: web
    name: livemart-api-gateway
    runtime: java
    buildCommand: ./gradlew :api-gateway:bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar api-gateway/build/libs/api-gateway-2.0.0.jar --spring.profiles.active=render
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: CORS_ALLOWED_ORIGINS
        value: https://livemart-parkmin-jes-projects.vercel.app
      # 아래 변수들은 대시보드에서 직접 입력 필요
      - key: REDIS_URL
        sync: false   # Upstash Redis URL
      - key: USER_SERVICE_URL
        sync: false   # https://livemart-user-service.onrender.com
      - key: PRODUCT_SERVICE_URL
        sync: false   # https://livemart-product-service.onrender.com
      - key: ORDER_SERVICE_URL
        sync: false   # https://livemart-order-service.onrender.com
      - key: PAYMENT_SERVICE_URL
        sync: false   # https://livemart-payment-service.onrender.com
      - key: AI_SERVICE_URL
        sync: false   # https://livemart-ai-service.onrender.com
      - key: INVENTORY_SERVICE_URL
        sync: false   # https://livemart-inventory-service.onrender.com

  # ─────────────────────────────────────────────
  # User Service (회원가입 / 로그인 / OAuth2)
  # ─────────────────────────────────────────────
  - type: worker
    name: livemart-user-service
    runtime: java
    buildCommand: ./gradlew :user-service:bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar user-service/build/libs/user-service-2.0.0.jar --spring.profiles.active=render
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false   # Neon PostgreSQL JDBC URL
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH2_REDIRECT_URI
        value: https://livemart-parkmin-jes-projects.vercel.app/auth/oauth2/callback
      - key: OAUTH2_BASE_URL
        sync: false   # https://livemart-api-gateway.onrender.com

  # ─────────────────────────────────────────────
  # Product Service (상품 목록 / 검색 / 카테고리)
  # ─────────────────────────────────────────────
  - type: worker
    name: livemart-product-service
    runtime: java
    buildCommand: ./gradlew :product-service:bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar product-service/build/libs/product-service-2.0.0.jar --spring.profiles.active=render
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false

  # ─────────────────────────────────────────────
  # Order Service (주문 / 쿠폰 / 반품)
  # ─────────────────────────────────────────────
  - type: worker
    name: livemart-order-service
    runtime: java
    buildCommand: ./gradlew :order-service:bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar order-service/build/libs/order-service-2.0.0.jar --spring.profiles.active=render
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false   # user-service와 동일한 값

  # ─────────────────────────────────────────────
  # Payment Service (토스 결제)
  # ─────────────────────────────────────────────
  - type: worker
    name: livemart-payment-service
    runtime: java
    buildCommand: ./gradlew :payment-service:bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar payment-service/build/libs/payment-service-2.0.0.jar --spring.profiles.active=render
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: TOSS_CLIENT_KEY
        value: test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq
      - key: TOSS_SECRET_KEY
        sync: false
      - key: DB_PASSWORD
        sync: false

  # ─────────────────────────────────────────────
  # AI Service (추천 / 챗봇 — OpenAI 없으면 fallback)
  # ─────────────────────────────────────────────
  - type: worker
    name: livemart-ai-service
    runtime: java
    buildCommand: ./gradlew :ai-service:bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar ai-service/build/libs/ai-service-2.0.0.jar --spring.profiles.active=render
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false   # 없으면 빈칸 (fallback 응답 반환)

  # ─────────────────────────────────────────────
  # Inventory Service (재고 관리)
  # ─────────────────────────────────────────────
  - type: worker
    name: livemart-inventory-service
    runtime: java
    buildCommand: ./gradlew :inventory-service:bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar inventory-service/build/libs/inventory-service-2.0.0.jar --spring.profiles.active=render
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
