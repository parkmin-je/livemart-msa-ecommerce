[build]
builder = "NIXPACKS"
buildCommand = "cd .. && ./gradlew :eureka-server:bootJar -x test"

[deploy]
startCommand = "java -Xms128m -Xmx256m -jar eureka-server/build/libs/eureka-server-2.0.0.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
