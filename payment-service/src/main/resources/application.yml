toss:
  payments:
    client-key: ${TOSS_CLIENT_KEY}
    secret-key: ${TOSS_SECRET_KEY}

server:
  port: 8084
  shutdown: graceful

spring:
  application:
    name: payment-service
  main:
    allow-bean-definition-overriding: true
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5437}/paymentdb
    username: ${DB_USERNAME:paymentapp}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  redis:
    host: localhost
    port: 6379
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: false
    redis:
      enabled: false
    elasticsearch:
      enabled: false
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}
      transport: http

# 로컬 개발: 호스트명 해결 타임아웃 단축 (Cannot determine local hostname WARN 방지)
spring.cloud.inetutils.timeout-seconds: 1
logging.level.com.netflix.discovery: ERROR
logging.level.com.netflix.eureka: ERROR

---
# ── Railway 클라우드 프로파일 ────────────────────────────────
spring:
  config:
    activate:
      on-profile: "railway"
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8084}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server.railway.internal:8761/eureka/}
    initial-instance-info-replication-interval-seconds: 15
  instance:
    prefer-ip-address: false
    hostname: ${RAILWAY_PRIVATE_DOMAIN:payment-service.railway.internal}
    non-secure-port: ${PORT:8084}
    non-secure-port-enabled: true

logging:
  level:
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR

---
# ── Render 무료 클라우드 프로파일 ─────────────────────────────
spring:
  config:
    activate:
      on-profile: "render"
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8084}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR
